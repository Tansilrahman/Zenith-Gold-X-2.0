<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Gold X</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    /* Premium wave background */
    #waveCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    /* Particle layer */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .card {
      background: rgba(26, 26, 26, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .gold {
      color: #D4AF37;
    }

    .gold-btn {
      background: linear-gradient(135deg, #FFDF73 0%, #D4AF37 50%, #B89222 100%);
      color: black;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
    }

    .gold-btn:hover {
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
      transform: translateY(-2px);
    }

    /* Custom premium scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.4);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 175, 55, 0.8);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <canvas id="waveCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>

  <!-- Persistent Logo -->
  <div class="fixed top-6 left-6 z-50 flex items-center gap-3">
    <svg width="40" height="40" viewBox="0 0 100 100" class="mr-3 filter drop-shadow-[0_0_8px_rgba(212,175,55,0.8)]">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFDF73" />
          <stop offset="50%" stop-color="#D4AF37" />
          <stop offset="100%" stop-color="#B89222" />
        </linearGradient>
      </defs>
      <path d="M20 20 L80 20 L40 80 L80 80" stroke="url(#goldGrad)" stroke-width="12" fill="none" stroke-linecap="round"
        stroke-linejoin="round" />
      <path d="M20 20 L60 80" stroke="#FFDF73" stroke-width="4" fill="none" opacity="0.5" />
    </svg>
    <h1 class="text-yellow-400 font-bold tracking-widest text-lg">
      ZENITH GOLD X
    </h1>
  </div>

  <div id="app" class="relative z-10 w-full min-h-screen"></div>

  <script>
    function showToast(msg) {
      const container = document.getElementById("toastContainer");
      if (!container) return;
      const el = document.createElement("div");
      el.className = "px-6 py-3 rounded shadow-2xl font-mono text-xs backdrop-blur-md bg-black/80 border border-yellow-500/50 text-yellow-400 transform transition-all duration-300 translate-x-20 opacity-0 pointer-events-auto shadow-[0_4px_20px_rgba(212,175,55,0.2)]";
      el.innerText = msg;
      container.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.remove("translate-x-20", "opacity-0");
      });
      setTimeout(() => {
        el.classList.add("translate-x-20", "opacity-0");
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    /* =========================
       ZGX MASTER DATABASE ENGINE
    ========================= */

    const DB_KEY = "ZGX_DB";

    /* Initialize Database */
    function initializeDB() {

      const db = {
        users: [
          { id: 1, email: "tansil@admin", password: "123", role: "admin", wallet: 0 },
          { id: 2, email: "tansil@user", password: "123", role: "citizen", wallet: 0, co2: 0, gardenStage: 0 },
          { id: 3, email: "tansil@worker", password: "123", role: "worker", wallet: 0, completed: 0 },
          { id: 4, email: "tansil@ngo", password: "123", role: "ngo", wallet: 0 }
        ],

        wasteSubmissions: [],
        foodTickets: [],
        withdrawals: [],
        gardens: [],
        reserve: 50000
      };

      localStorage.setItem(DB_KEY, JSON.stringify(db));
      return db;
    }

    /* Load Database Safely */
    function getDB() {

      let raw = localStorage.getItem(DB_KEY);

      if (!raw) {
        return initializeDB();
      }

      try {

        const db = JSON.parse(raw);

        if (!db.users) db.users = [];
        if (!db.wasteSubmissions) db.wasteSubmissions = [];
        if (!db.foodTickets) db.foodTickets = [];
        if (!db.withdrawals) db.withdrawals = [];
        if (!db.gardens) db.gardens = [];

        return db;

      } catch {

        return initializeDB();

      }
    }

    /* Save Database */
    function saveDB(db) {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    /* =========================
       SESSION ENGINE
    ========================= */

    let currentUser = null;

    try {
      currentUser = JSON.parse(localStorage.getItem("ZGX_SESSION"));
    } catch {
      currentUser = null;
    }

    function setSession(user) {
      localStorage.setItem("ZGX_SESSION", JSON.stringify(user));
      currentUser = user;
    }

    function clearSession() {
      localStorage.removeItem("ZGX_SESSION");
      currentUser = null;
    }

    /* =========================
       HAVERSINE DISTANCE (meters)
    ========================= */
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    /* =========================
       BASIC ROUTER
    ========================= */
    function render() {
      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }
    }

    function renderLogin() {
      document.getElementById("app").innerHTML = `
  <div class="min-h-screen flex items-center justify-center">
    <div class="card p-10 rounded-xl w-full max-w-md shadow-xl border border-yellow-500/30">
      <h2 class="text-3xl font-bold mb-6 gold text-center uppercase tracking-widest">Zenith Gold X</h2>

      <input id="email" placeholder="Email (e.g. tansil@user)"
        class="w-full p-3 mb-4 rounded bg-black border border-gray-700 outline-none focus:border-yellow-500"/>

      <input id="password" type="password" placeholder="Password (123)"
        class="w-full p-3 mb-6 rounded bg-black border border-gray-700 outline-none focus:border-yellow-500"/>

      <button onclick="login()"
        class="gold-btn w-full py-3 rounded uppercase tracking-widest">Login</button>

      <p id="loginError" class="text-red-500 text-center mt-4 hidden">
        Invalid Credentials
      </p>

      <div class="text-gray-500 text-xs mt-6 text-center font-mono">
        Demo Accounts:<br/>
        tansil@admin | tansil@user<br/>
        tansil@worker | tansil@ngo<br/>
        Password: 123
      </div>
    </div>
  </div>
  `;
    }

    /* =========================
       LOGIN SYSTEM
    ========================= */

    function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const db = getDB();

      const user = db.users.find(
        u => u.email === email && u.password === password
      );

      if (!user) {

        const error = document.getElementById("loginError");

        if (error) {
          error.classList.remove("hidden");
        }

        return;

      }


      if (!db.loginLogs) db.loginLogs = [];
      db.loginLogs.push({ email: user.email, role: user.role, time: Date.now() });
      saveDB(db);
      setSession(user);

      render();

    }

    /* =========================
       LOGOUT
    ========================= */

    function logout() {

      clearSession();

      render();

    }

    function updateBanner() {
      const db = getDB();
      const active = db.foodTickets.some(t => t.status === "open");
      let banner = document.getElementById("globalNgoBanner");

      let dbUpdated = false;
      const now = Date.now();
      db.foodTickets.forEach(t => {
        if (t.status === 'open' && t.expiry && now > t.expiry) {
          t.status = 'expired';
          dbUpdated = true;
        }
      });
      if (dbUpdated) saveDB(db);

      if (active && currentUser) {
        if (!banner) {
          banner = document.createElement("div");
          banner.id = "globalNgoBanner";
          banner.className = "w-full bg-blue-900/90 text-blue-200 text-xs text-center py-2 font-mono uppercase tracking-widest border-b border-blue-500/50 fixed top-0 z-40 shadow-[0_0_15px_rgba(59,130,246,0.5)]";
          banner.innerHTML = "Active NGO Asset Demands on Network! Support logistics to earn ZC.";
          document.body.appendChild(banner);
        }
      } else {
        if (banner) banner.remove();
      }
    }

    function renderDashboard() {
      updateBanner();

      if (!currentUser) {
        let banner = document.getElementById("globalNgoBanner");
        if (banner) banner.remove();
        renderLogin();
        return;
      }

      if (currentUser.role === "citizen") renderCitizen();
      if (currentUser.role === "worker") renderWorker();
      if (currentUser.role === "ngo") renderNGO();
      if (currentUser.role === "admin") renderAdmin();
    }

    /* =========================
       CITIZEN ENGINE
    ========================= */
    function switchCitizenTab(id) {
      ['tab-overview', 'tab-waste', 'tab-garden', 'tab-food'].forEach(t => {
        const el = document.getElementById(t);
        const btn = document.querySelector(`[data-tab="${t}"]`);
        if (el) el.classList.toggle('hidden', t !== id);
        if (btn) btn.classList.toggle('border-yellow-500', t === id);
        if (btn) btn.classList.toggle('text-yellow-400', t === id);
        if (btn) btn.classList.toggle('text-gray-500', t !== id);
        if (btn) btn.classList.toggle('border-transparent', t !== id);
      });
      if (id === 'tab-waste') setTimeout(() => { if (map) map.invalidateSize(); else initializeMap(); }, 150);
    }

    function renderCitizen() {
      const db = getDB();
      const user = db.users.find(u => u.id === currentUser.id);
      const leaderboard = [...db.users].filter(u => u.role === "citizen").sort((a, b) => b.wallet - a.wallet);
      const openTickets = db.foodTickets.filter(t => t.status === 'open');

      document.getElementById("app").innerHTML = `
  <div class="min-h-screen">
    <!-- Header -->
    <div class="sticky top-0 z-40 bg-black/80 backdrop-blur-xl border-b border-white/5 px-8 py-4 flex justify-between items-center">
      <div>
        <h2 class="text-xl gold font-bold uppercase tracking-widest">Citizen Terminal</h2>
        <p class="text-[10px] text-gray-500 font-mono">${user.email}</p>
      </div>
      <button onclick="logout()" class="border border-red-500/40 text-red-400 px-4 py-2 rounded-lg uppercase tracking-widest text-xs hover:bg-red-500/10 transition-all">Logout</button>
    </div>

    <!-- Stats Bar -->
    <div class="grid grid-cols-3 gap-4 px-8 py-6">
      <div class="card p-5 rounded-xl border-l-2 border-yellow-500 bg-gradient-to-r from-yellow-500/5 to-transparent">
        <div class="text-[9px] text-gray-500 uppercase tracking-[0.2em] mb-1">Z Coins</div>
        <div class="text-3xl gold font-mono font-bold">${user.wallet}</div>
      </div>
      <div class="card p-5 rounded-xl border-l-2 border-emerald-500 bg-gradient-to-r from-emerald-500/5 to-transparent">
        <div class="text-[9px] text-gray-500 uppercase tracking-[0.2em] mb-1">CO₂ Offset (kg)</div>
        <div class="text-3xl font-mono font-bold text-emerald-400">${user.co2 || 0}</div>
      </div>
      <div class="card p-5 rounded-xl border-l-2 border-blue-500 bg-gradient-to-r from-blue-500/5 to-transparent">
        <div class="text-[9px] text-gray-500 uppercase tracking-[0.2em] mb-1">Garden Stage</div>
        <div class="text-3xl font-mono font-bold text-blue-400">${user.gardenStage || 0}<span class="text-gray-600 text-xl">/3</span></div>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="px-8">
      <div class="flex border-b border-gray-800/80 mb-6 gap-1">
        <button data-tab="tab-overview" onclick="switchCitizenTab('tab-overview')" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-yellow-500 text-yellow-400 transition-all">Overview</button>
        <button data-tab="tab-waste" onclick="switchCitizenTab('tab-waste')" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition-all">Upload Waste</button>
        <button data-tab="tab-garden" onclick="switchCitizenTab('tab-garden')" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition-all">Terrace Garden</button>
        <button data-tab="tab-food" onclick="switchCitizenTab('tab-food')" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition-all">Food Logistics</button>
      </div>

      <!-- TAB: Overview -->
      <div id="tab-overview">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="card p-6 rounded-xl border border-white/5 bg-black/30">
            <h3 class="gold mb-5 uppercase tracking-widest font-bold text-sm">Offer Exchange</h3>
            <div class="flex flex-col gap-3">
              <button onclick="redeemVoucher()" class="gold-btn px-4 py-3 rounded-lg text-sm uppercase tracking-widest">Redeem 200 ZC → Voucher</button>
              <button onclick="redeemUPI()" class="border border-yellow-500/50 text-yellow-500 hover:bg-yellow-500/10 px-4 py-3 rounded-lg text-sm uppercase tracking-widest transition-all">Redeem 500 ZC → UPI Transfer</button>
            </div>
          </div>
          <div class="card p-6 rounded-xl border border-white/5 bg-black/30">
            <h3 class="gold mb-5 uppercase tracking-widest font-bold text-sm">Withdraw Z Coins</h3>
            <input type="number" id="withdrawAmount" placeholder="Minimum 100 ZC" class="mb-4 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg font-mono text-sm outline-none focus:border-yellow-500 transition-colors"/>
            <button onclick="requestWithdrawal()" class="gold-btn w-full px-6 py-3 rounded-lg uppercase text-sm font-bold">Request Withdrawal</button>
          </div>
        </div>
        <div class="card p-6 rounded-xl border border-white/5 bg-black/30 mt-6">
          <h3 class="gold mb-5 uppercase tracking-widest font-bold text-sm">Citizen Leaderboard</h3>
          <div class="space-y-2">
            ${leaderboard.map((u, i) => `
              <div class="flex justify-between items-center p-3 rounded-lg font-mono text-sm ${i === 0 ? 'bg-gradient-to-r from-yellow-500/20 to-yellow-600/5 border border-yellow-500/30 text-yellow-400' : 'border border-gray-800/50 text-gray-400'} transition-all hover:border-gray-600">
                <span class="flex items-center gap-3"><span class="text-[10px] ${i === 0 ? 'text-yellow-500' : 'text-gray-600'} w-5">#${i + 1}</span>${u.email.split('@')[0]}</span>
                <span class="${i === 0 ? 'text-yellow-400' : 'text-gray-500'}">${u.wallet} ZC</span>
              </div>`).join("")}
          </div>
        </div>
      </div>

      <!-- TAB: Upload Waste -->
      <div id="tab-waste" class="hidden">
        <div class="card p-8 rounded-xl border border-yellow-500/20 bg-black/30 max-w-2xl">
          <h3 class="gold mb-6 uppercase tracking-widest font-bold text-sm">Upload Waste Report</h3>
          <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Evidence Photo</label>
          <input type="file" accept="image/*" capture="environment" id="wastePhoto" class="mb-6 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-xs text-gray-400 cursor-pointer"/>
          <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Live Geolocation</label>
          <div id="map" style="height:280px;" class="mb-6 rounded-xl border border-gray-700/50 shadow-inner overflow-hidden"></div>
          <button id="wasteSubmitBtn" onclick="submitWaste()" class="gold-btn w-full px-6 py-3 rounded-lg uppercase text-sm font-bold shadow-lg">Capture Location & Submit</button>
        </div>
      </div>

      <!-- TAB: Garden -->
      <div id="tab-garden" class="hidden">
        <div class="card p-8 rounded-xl border border-emerald-500/20 bg-black/30 max-w-2xl">
          <h3 class="gold mb-6 uppercase tracking-widest font-bold text-sm">Terrace Garden Update</h3>
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Plant Count</label>
              <input type="number" id="plantCount" min="0" placeholder="e.g. 12" class="w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-sm outline-none focus:border-emerald-500 transition-colors"/>
            </div>
            <div>
              <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Tree Count</label>
              <input type="number" id="treeCount" min="0" placeholder="e.g. 3" class="w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-sm outline-none focus:border-emerald-500 transition-colors"/>
            </div>
          </div>
          <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Garden Photo</label>
          <input type="file" accept="image/*" capture="environment" id="gardenPhoto" class="mb-6 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-xs text-gray-400 cursor-pointer"/>
          <button onclick="updateGarden()" class="w-full px-6 py-3 rounded-lg uppercase text-sm font-bold bg-gradient-to-r from-emerald-700 to-emerald-500 text-white hover:shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all">Submit Garden Update</button>
          <p class="text-center text-[10px] text-gray-600 mt-4 font-mono">3 uploads required · 20 day cooldown</p>
        </div>
      </div>

      <!-- TAB: Food Logistics -->
      <div id="tab-food" class="hidden">
        <div class="card p-8 rounded-xl border border-blue-500/20 bg-black/30 max-w-2xl">
          <h3 class="gold mb-6 uppercase tracking-widest font-bold text-sm">Food Logistics</h3>
          ${openTickets.length === 0
          ? '<p class="text-sm text-gray-500 italic">No open NGO ledgers. Check back later.</p>'
          : `<label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Active Ledger</label>
               <select id="foodLedger" class="mb-4 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-sm text-gray-300 outline-none focus:border-blue-500 transition-colors">
                 <option value="">-- Select Active Ledger --</option>
                 ${openTickets.map(t => `<option value="${t.id}">${t.item} (Needs ${t.remainingQty})</option>`).join('')}
               </select>
               <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Quantity to Transfer</label>
               <input type="number" id="foodQty" placeholder="Volume" class="mb-6 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg text-sm font-mono outline-none focus:border-blue-500 transition-colors"/>
               <button onclick="submitFood()" class="w-full px-6 py-3 rounded-lg uppercase text-sm font-bold bg-gradient-to-r from-blue-700 to-blue-500 text-white hover:shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all">Transfer Assets</button>`
        }
        </div>
      </div>
    </div>
    <div class="pb-20"></div>
  </div>
  `;
      initializeMap();
    }

    let map = null;
    let currentLat = null;
    let currentLng = null;

    function initializeMap() {
      try {
        const mapContainer = document.getElementById('map');
        if (!mapContainer) return;

        if (map) {
          map.remove();
          map = null;
        }
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);

        const geoOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(position => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;
          if (map) {
            map.setView([currentLat, currentLng], 15);
            L.marker([currentLat, currentLng]).addTo(map)
              .bindPopup("Your Location")
              .openPopup();
          }
        }, error => {
          console.error("Geolocation Error:", error);
          showToast("Location permission required to use map features.");
        }, geoOptions);
      } catch (e) {
        console.error("Map Initialization Error:", e);
      }
    }

    function submitWaste() {
      try {
        const photo = document.getElementById("wastePhoto").files[0];
        if (!photo) { showToast("Please upload waste photo."); return; }
        if (photo.size < 1024 * 10) { showToast("AI Confidence Low: File size < 10kb. Rejected."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        const db = getDB();
        const pendingCheck = db.wasteSubmissions.find(s => s.userId === currentUser.id && s.status === "pending");
        if (pendingCheck) { showToast("You already have a pending submission."); return; }

        const btn = document.getElementById("wasteSubmitBtn");
        if (btn) {
          btn.innerHTML = "Verifying... (AI 92%)";
          btn.disabled = true;
        }

        setTimeout(() => {
          try {
            const currentDb = getDB();
            currentDb.wasteSubmissions.push({
              id: Date.now(),
              userId: currentUser.id,
              lat: currentLat,
              lng: currentLng,
              status: "pending"
            });
            saveDB(currentDb);

            showToast("Waste submitted successfully. Waiting for worker verification.");
            renderCitizen();
          } catch (e) {
            console.error("Waste Submit Timeout Error:", e);
            if (btn) {
              btn.innerHTML = "Capture Location & Submit";
              btn.disabled = false;
            }
          }
        }, 1500);
      } catch (e) {
        console.error("Waste Submit Error:", e);
      }
    }

    function updateGarden() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);

        if (user.gardenStage >= 3) { showToast("Garden reward already completed."); return; }

        const plants = parseInt(document.getElementById("plantCount")?.value) || 0;
        const trees = parseInt(document.getElementById("treeCount")?.value) || 0;

        const photo = document.getElementById("gardenPhoto").files[0];
        if (!photo) { showToast("Upload garden photo."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        if (user.gardenLat && user.gardenLng) {
          if (getDistance(currentLat, currentLng, user.gardenLat, user.gardenLng) > 500) {
            showToast("Location mismatch! You must upload from your registered garden location within 500m.");
            return;
          }
        } else {
          user.gardenLat = currentLat;
          user.gardenLng = currentLng;
        }

        const now = new Date().getTime();
        if (user.lastGardenUpdate) {
          const diff = now - user.lastGardenUpdate;
          const days = diff / (1000 * 60 * 60 * 24);
          if (days < 20) { showToast("You must wait 20 days between garden updates."); return; }
        }

        user.gardenStage = (user.gardenStage || 0) + 1;
        user.lastGardenUpdate = now;

        const reward = (plants * 1) + (trees * 5);
        const co2Gain = (plants * 0.5) + (trees * 5);

        user.wallet += reward;
        user.co2 = (user.co2 || 0) + co2Gain;
        db.reserve -= reward;

        if (user.gardenStage === 3) {
          user.wallet += 50;
          db.reserve -= 50;
          showToast(`Garden milestone completed! 50 ZC credited + ${reward} ZC based on plants/trees.`);
        } else {
          showToast(`Garden update recorded. Stage ${user.gardenStage}/3. Earned ${reward} Z Coins.`);
        }

        saveDB(db);
        renderCitizen();
      } catch (e) {
        console.error("Update Garden Error:", e);
      }
    }

    function submitFood() {

      const db = getDB();

      const ledgerId = document.getElementById("foodLedger").value;
      const qty = parseInt(document.getElementById("foodQty").value);

      const ticket = db.foodTickets.find(
        t => t.id.toString() === ledgerId.toString()
      );

      if (!ticket) return;

      ticket.remainingQty -= qty;

      ticket.contributors.push({
        user: currentUser.email,
        qty: qty,
        time: Date.now()
      });

      if (ticket.remainingQty <= 0) {
        ticket.status = "closed";
      }

      const user = db.users.find(u => u.id === currentUser.id);

      user.wallet += qty * 2;

      saveDB(db);

      showToast("Food donated");

      renderCitizen();
    }

    function initializeWorkerMap() {
      try {
        const mapContainer = document.getElementById('workerMap');

        if (workerMap) {
          workerMap.remove();
          workerMap = null;
        }
        workerMap = L.map('workerMap').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(workerMap);

        const geoOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(position => {
          workerLat = position.coords.latitude;
          workerLng = position.coords.longitude;
          if (workerMap) {
            workerMap.setView([workerLat, workerLng], 15);
            L.marker([workerLat, workerLng])
              .addTo(workerMap)
              .bindPopup("Worker Location")
              .openPopup();
          }
          loadPendingSubmissions();
        }, error => {
          console.error("Worker Geolocation Error:", error);
          showToast("Location permission required for worker mapping.");
        }, geoOptions);
      } catch (e) {
        console.error("Worker Map Init Error:", e);
      }

      try {
        const db = getDB();
        const submission = db.wasteSubmissions.find(s => s.id === id);

        if (!submission || submission.status !== "pending") { showToast("Already verified."); return; }

        if (workerLat === null || workerLng === null) {
          showToast("Worker location not captured.");
          return;

        const distance = getDistance(workerLat, workerLng, submission.lat, submission.lng);

        if (citizen) citizen.wallet += 10;
        if (worker) {
          worker.wallet += 15;

          const today = new Date().toISOString().split('T')[0];

            worker.dailyCount = 0;
            worker.lastWorkDate = today;

        db.reserve += 25;

        showToast("Verification successful. Rewards distributed.");
        renderWorker();

        console.error("Verify Waste Error:", e);
      }
    }

      <div class="card p-6 rounded shadow-lg border-l-2 border-green-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Verified Waste</div>
        <div class="text-3xl gold font-mono">${verifiedWaste}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-blue-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Food Ledgers</div>
        <div class="text-3xl gold font-mono">${db.foodTickets.length}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-purple-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Reserve Ratio</div>
        <div class="text-2xl gold font-mono">${reserveRatio}% <span class="text-xs text-gray-400 block">${status}</span></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">Worker Activity</h4><canvas id="workerActivityChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">Garden Adoption</h4><canvas id="gardenChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">CO2 Growth</h4><canvas id="co2Chart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">NGO Fulfillment</h4><canvas id="ngoChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800 lg:col-span-2"><h4 class="text-xs gold uppercase text-center mb-2">Reserve Health Gauge</h4><canvas id="reserveGauge"></canvas></div>
    </div>

    <!-- Approvals -->
    <div class="card p-6 rounded shadow-lg border border-gray-800 max-w-3xl">
      <h3 class="gold mb-4 uppercase font-bold tracking-widest border-b border-gray-800 pb-2">Pending Withdrawals</h3>
      <div class="space-y-3">
        ${pendingWithdrawals.length === 0
          ? "<p class='text-gray-500 text-sm italic'>No pending withdrawals.</p>"
          : pendingWithdrawals.map(w => `
            <div class="bg-gray-900 border border-gray-700 p-4 rounded flex justify-between items-center text-sm font-mono">
              <div>
                  <div class="text-yellow-500">Request ID: ${w.id}</div>
                  <div class="text-gray-400">Node ID: ${w.userId} | Amt: ${w.amount} ZC</div>
              </div>
              <button onclick="approveWithdrawal(${w.id})" class="gold-btn px-4 py-2 rounded text-xs uppercase shadow">Approve</button>
            </div>
          `).join("")
        }
      </div>
    </div>
  </div>
  `;

      initAdminAnalytics();
    }

    function approveWithdrawal(id) {
      try {
        const db = getDB();
        const withdrawal = db.withdrawals.find(w => w.id === id);
        if (!withdrawal || withdrawal.status !== "pending") { showToast("Already processed."); return; }

        withdrawal.status = "approved";
        db.reserve -= withdrawal.amount;
        saveDB(db);

        showToast("Withdrawal approved.");
        renderAdmin();
      } catch (e) {
        console.error("Approve Withdrawal Error:", e);
      }
    }

    /* =========================
       DEMO DATA GENERATOR
    ========================= */

    function seedDemoData() {

      const db = getDB();

      if (db.wasteSubmissions.length > 0) return;

      for (let i = 0; i < 20; i++) {

        db.wasteSubmissions.push({
          id: Date.now() + i,
          userId: 3,
          lat: 20.5937 + Math.random() * 0.01,
          lng: 78.9629 + Math.random() * 0.01,
          status: i < 15 ? "verified" : "pending"
        });

      }

      for (let i = 0; i < 5; i++) {

        db.gardens.push({
          id: Date.now() + 100 + i,
          userId: 2,
          plants: 10 + i,
          trees: 1
        });

      }

      for (let i = 0; i < 3; i++) {

        db.foodTickets.push({
          id: Date.now() + 200 + i,
          ngoId: 4,
          item: "Rice",
          requiredQty: 100,
          remainingQty: 30,
          status: "open",
          contributors: []
        });

      }

      db.withdrawals.push({
        id: Date.now() + 500,
        userId: 2,
        amount: 200,
        status: "pending"
      });

      saveDB(db);

    }

    /* =========================
       ANALYTICS ENGINE
    ========================= */

    function computeAnalytics() {

      const db = getDB();

      const verified = db.wasteSubmissions.filter(s => s.status === "verified").length;

      const workers = db.users.filter(u => u.role === "worker").length;

      const gardens = db.gardens.length;

      const co2 = verified * 0.5;

      const ngoRequested = db.foodTickets.reduce((a, b) => a + b.requiredQty, 0);

      const ngoFulfilled = db.foodTickets.reduce((a, b) => a + (b.requiredQty - b.remainingQty), 0);

      const distributed = db.users.reduce((a, b) => a + (b.wallet || 0), 0);

      const reserveRatio = (db.reserve / (db.reserve + distributed)) * 100;

      return {

        workers,
        verified,
        gardens,
        co2,
        ngoRequested,
        ngoFulfilled,
        reserveRatio

      };

    }

    /* =========================
       CHART RENDERER
    ========================= */

    function renderAdminCharts() {
      if (window.workerActivityChart) window.workerActivityChart.destroy();
      if (window.gardenChart) window.gardenChart.destroy();
      if (window.co2Chart) window.co2Chart.destroy();
      if (window.ngoChart) window.ngoChart.destroy();
      if (window.reserveGauge) window.reserveGauge.destroy();

      const data = computeAnalytics();

      Chart.defaults.color = "#aaa";

      /* Worker Activity */

      window.workerActivityChart = new Chart(
        document.getElementById("workerActivityChart"),
        {
          type: "bar",
          data: {
            labels: ["Workers", "Verified"],
            datasets: [{
              data: [data.workers, data.verified],
              backgroundColor: ["#888", "#D4AF37"]
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* Garden Adoption */

      window.gardenChart = new Chart(
        document.getElementById("gardenChart"),
        {
          type: "line",
          data: {
            labels: ["Stage1", "Stage2", "Stage3"],
            datasets: [{
              data: [data.gardens / 3, data.gardens / 2, data.gardens],
              borderColor: "#00ff9c",
              tension: 0.4
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* CO2 */

      window.co2Chart = new Chart(
        document.getElementById("co2Chart"),
        {
          type: "bar",
          data: {
            labels: ["CO2 Saved"],
            datasets: [{
              data: [data.co2],
              backgroundColor: "#00e5ff"
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* NGO */

      window.ngoChart = new Chart(
        document.getElementById("ngoChart"),
        {
          type: "doughnut",
          data: {
            labels: ["Fulfilled", "Remaining"],
            datasets: [{
              data: [
                data.ngoFulfilled,
                data.ngoRequested - data.ngoFulfilled
              ],
              backgroundColor: ["#4caf50", "#444"]
            }]
          }
        }
      );

      /* Reserve Health */

      window.reserveGauge = new Chart(
        document.getElementById("reserveGauge"),
        {
          type: "doughnut",
          data: {
            labels: ["Reserve", "Distributed"],
            datasets: [{
              data: [
                data.reserveRatio,
                100 - data.reserveRatio
              ],
              backgroundColor: ["#D4AF37", "#222"]
            }]
          }
        }
      );

    }

    /* =========================
       AUTO INITIALIZE
    ========================= */

    function initAdminAnalytics() {

      seedDemoData();

      setTimeout(() => {
        renderAdminCharts();
      }, 300);

    }

    /* =========================
       ANIMATIONS
    ========================= */
    const waveCanvas = document.getElementById("waveCanvas");
    const wctx = waveCanvas.getContext("2d");
    function resizeCanvas() {
      waveCanvas.width = window.innerWidth;
      waveCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let waveOffset = 0;
    let waveReq;
    function animateWave() {
      if (!wctx) return;
      wctx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      wctx.beginPath();
      wctx.moveTo(0, waveCanvas.height / 2);
      for (let x = 0; x < waveCanvas.width; x++) {
        const y = waveCanvas.height / 2 + Math.sin((x + waveOffset) * 0.01) * 20;
        wctx.lineTo(x, y);
      }
      wctx.strokeStyle = "rgba(212,175,55,0.08)";
      wctx.lineWidth = 2;
      wctx.stroke();

      waveOffset += 1;
      waveReq = requestAnimationFrame(animateWave);
    }
    if (waveReq) cancelAnimationFrame(waveReq);
    animateWave();

    const particleCanvas = document.getElementById("particleCanvas");
    const pctx = particleCanvas ? particleCanvas.getContext("2d") : null;
    if (particleCanvas) {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }

    let particles = [];
    if (particleCanvas) {
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * particleCanvas.width,
          y: Math.random() * particleCanvas.height,
          r: Math.random() * 2,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }

    let particleReq;
    function animateParticles() {
      if (!pctx) return;
      pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      pctx.fillStyle = "rgba(212,175,55,0.4)";
      particles.forEach(p => {
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fill();
        p.y -= p.speed;
        if (p.y < 0) {
          p.y = particleCanvas.height;
        }
      });
      particleReq = requestAnimationFrame(animateParticles);
    }
    if (particleReq) cancelAnimationFrame(particleReq);
    animateParticles();

    /* =========================
       SAFE APP START
    ========================= */

    function startApp() {

      const db = getDB();

      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }

    }

    startApp();
  </script>
</body>
