<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Gold X™</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Leaflet OS Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --gold: #D4AF37;
      --gold-hover: #b8860b;
    }

    body {
      background-color: var(--bg);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .card {
      background-color: var(--card);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.1);
    }

    .gold-text {
      color: var(--gold);
    }

    .gold-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-hover));
      color: #000;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .gold-btn:hover {
      opacity: 0.9;
    }

    .gold-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: #444;
      color: #888;
    }

    .outline-btn {
      border: 1px solid var(--gold);
      color: var(--gold);
      background: transparent;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
      font-size: 0.875rem;
      width: 100%;
      cursor: pointer;
    }

    .outline-btn:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    .outline-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #444;
      color: #888;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--gold);
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-glow {
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold);
    }

    .leaflet-container {
      z-index: 1;
      background: #111;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #1a1a1a;
      color: white;
      border: 1px solid var(--gold);
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    /* ==============================================
       DATABASE & STORAGE
       ============================================== */
    const DB_KEY = "zenith_gold_x_db";
    const SESSION_KEY = "zenith_gold_x_session";

    function initDB() {
      if (!localStorage.getItem(DB_KEY)) {
        const initialDB = {
          users: [
            { id: 1, email: "tansil@admin", password: "123", role: "admin", wallet: 0 },
            { id: 2, email: "tansil@user", password: "123", role: "citizen", wallet: 0, gardenStage: 0, lastGardenUpdate: 0 },
            { id: 3, email: "tansil@worker", password: "123", role: "worker", wallet: 0 },
            { id: 4, email: "tansil@ngo", password: "123", role: "ngo", wallet: 0 }
          ],
          waste: [],
          tickets: [],
          withdrawals: [],
          reserve: 50000
        };
        localStorage.setItem(DB_KEY, JSON.stringify(initialDB));
      }
    }

    function getDB() { return JSON.parse(localStorage.getItem(DB_KEY) || "{}"); }
    function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
    function getSession() { const s = localStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; }
    function setSession(user) { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    /* ==============================================
       GEOLOCATION SYSTEM
       ============================================== */
    let currentLoc = { lat: 0, lng: 0, addr: "Locating...", active: false, lastFetch: 0 };
    let geoWatchId = null;

    async function getAddress(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        const data = await res.json();
        return data.display_name || "Unknown Address";
      } catch (e) { return "Address retrieval failed (rate limited/offline)"; }
    }

    function startGeoTracker() {
      if (geoWatchId) return;
      if (navigator.geolocation) {
        geoWatchId = navigator.geolocation.watchPosition(async (pos) => {
          currentLoc.lat = pos.coords.latitude;
          currentLoc.lng = pos.coords.longitude;
          currentLoc.active = true;

          // Update Address rarely to avoid Nominatim Limits
          if (Date.now() - currentLoc.lastFetch > 30000) {
            currentLoc.addr = await getAddress(currentLoc.lat, currentLoc.lng);
            currentLoc.lastFetch = Date.now();
          }

          updateLiveLocationUI();
          if (window.onLocationUpdated) window.onLocationUpdated();
        }, (err) => {
          currentLoc.addr = "Location Service Disabled / Error";
          updateLiveLocationUI();
        }, { enableHighAccuracy: true });
      } else {
        currentLoc.addr = "Geolocation not supported.";
      }
    }

    function updateLiveLocationUI() {
      const ind = document.getElementById('live-location-text');
      if (ind && currentLoc.active) {
        ind.innerHTML = `<span class="text-green-500 font-bold mr-1">● ON</span> [${currentLoc.lat.toFixed(5)}, ${currentLoc.lng.toFixed(5)}] <br> <span class="text-xs text-gray-500">${currentLoc.addr}</span>`;
      }
    }

    // Haversine
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatTime(ms) {
      if (ms <= 0) return "00:00";
      const ts = Math.floor(ms / 1000);
      return `${Math.floor(ts / 60).toString().padStart(2, '0')}:${(ts % 60).toString().padStart(2, '0')}`;
    }

    /* ==============================================
       APP ROUTER & STATE
       ============================================== */
    const appEl = document.getElementById('app');
    let timerInterval = null;
    let globalLeafletMap = null;
    let mapWorkerMarker = null;

    function render() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      initDB();
      const session = getSession();

      // Safe Tickets Auto Expire
      const db = getDB();
      let ticketsChanged = false;
      const now = Date.now();
      if (Array.isArray(db.tickets)) {
        db.tickets.forEach(t => {
          if (t.status === "active" && now > t.expiresAt) {
            t.status = "expired"; ticketsChanged = true;
          }
        });
      }
      if (ticketsChanged) saveDB(db);

      if (!session) {
        renderLogin();
      } else {
        const freshUser = db.users.find(u => u.id === session.id);
        if (!freshUser) { clearSession(); renderLogin(); return; }
        setSession(freshUser);

        appEl.className = "min-h-screen";
        appEl.innerHTML = `
                <div class="w-full max-w-6xl mx-auto px-4 py-8 fade-in">
                    <header class="flex flex-col md:flex-row justify-between md:items-center mb-8 border-b border-[#333] pb-6">
                        <div class="mb-4 md:mb-0">
                            <h1 class="text-3xl font-bold header-glow gold-text tracking-wider uppercase mb-1">Zenith Gold X</h1>
                            <p class="text-gray-400 text-sm uppercase tracking-widest">${freshUser.role} Dashboard</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-right hidden sm:block">
                                <div class="text-xs uppercase text-gray-500 mb-1">Active Uplink</div>
                                <div id="live-location-text" class="text-sm">Locating...</div>
                            </div>
                            <button onclick="handleLogout()" class="outline-btn w-auto">Disconnect</button>
                        </div>
                    </header>
                    <main id="main-content"></main>
                </div>
            `;

        startGeoTracker();
        updateLiveLocationUI();

        const mainContent = document.getElementById('main-content');
        if (freshUser.role === 'admin') renderAdmin(mainContent, db);
        else if (freshUser.role === 'citizen') renderCitizen(mainContent, db, freshUser);
        else if (freshUser.role === 'worker') renderWorker(mainContent, db, freshUser);
        else if (freshUser.role === 'ngo') renderNGO(mainContent, db);
      }
    }

    /* ==============================================
       LOGIN PORTAL (Strictly 4 Accounts)
       ============================================== */
    function renderLogin() {
      appEl.className = "min-h-screen flex items-center justify-center p-4";
      appEl.innerHTML = `
            <div class="card w-full max-w-md fade-in text-center">
                <h1 class="text-3xl font-bold header-glow gold-text tracking-wider uppercase mb-2">Zenith Gold X</h1>
                <p class="text-gray-400 mb-8 text-sm uppercase tracking-widest">Secure Access Node</p>
                <div id="login-error" class="bg-red-900/20 text-red-500 border border-red-500/50 p-2 rounded text-sm mb-4 hidden"></div>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Authentication ID (Email)" required autocomplete="off">
                    <input type="password" id="password" placeholder="Passcode" required autocomplete="off">
                    <button type="submit" class="gold-btn mt-4">Establish Uplink</button>
                </form>
                <div class="mt-6 text-xs text-gray-500">Authorized Personnel Only.</div>
            </div>
        `;

      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errEl = document.getElementById('login-error');

        const db = getDB();
        const user = db.users.find(u => u.email === email && u.password === pass);

        if (user) {
          setSession(user);
          render();
        } else {
          errEl.textContent = "Invalid credentials. Access Denied.";
          errEl.classList.remove('hidden');
        }
      });
    }

    function handleLogout() {
      if (geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
      clearSession();
      render();
    }

    /* ==============================================
       COMMON REFRESHERS
       ============================================== */
    function refreshLeaderboard(db) {
      const lb = document.getElementById('dynamic-leaderboard');
      if (!lb) return;
      const citizens = [...db.users].filter(u => u.role === 'citizen').sort((a, b) => b.wallet - a.wallet).slice(0, 5);
      lb.innerHTML = citizens.map((c, i) => `
            <div class="flex justify-between items-center p-3 bg-[#111] rounded-lg border ${i === 0 ? 'border-[#D4AF37]' : 'border-[#222]'}">
                <span class="${i === 0 ? 'gold-text font-bold text-lg' : 'text-gray-300'}">${i === 0 ? '🏆' : '#' + (i + 1)} ${c.email.split('@')[0]}</span>
                <span class="font-mono text-gray-400">${c.wallet} ZC</span>
            </div>
        `).join("");
    }

    /* ==============================================
       CITIZEN PORTAL
       ============================================== */
    let currentWasteImage = null;

    function renderCitizen(container, db, user) {
      const activeTickets = Array.isArray(db.tickets) ? db.tickets.filter(t => t.status === "active") : [];
      const wasteCount = Array.isArray(db.waste) ? db.waste.filter(w => w.userId === user.id).length : 0;

      container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Wallet</div>
                    <div class="text-4xl font-bold gold-text">${user.wallet} ZC</div>
                    <button onclick="requestWithdrawal()" class="outline-btn mt-4 w-full">Withdraw</button>
                </div>
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Waste Reported</div>
                    <div class="text-4xl font-bold text-white">${wasteCount}</div>
                </div>
                <div class="card text-center md:col-span-2">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Live Top 5 Citizens</div>
                    <div id="dynamic-leaderboard" class="space-y-2 max-h-[140px] overflow-y-auto"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="card">
                        <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Civic Waste Reporting</h2>
                        <input type="file" id="waste-cam" accept="image/*" capture="environment" class="hidden" onchange="handleCam(event)">
                        <div class="bg-[#111] border border-[#333] rounded-lg h-48 mb-4 flex items-center justify-center overflow-hidden cursor-pointer" onclick="document.getElementById('waste-cam').click()">
                            <img id="waste-preview" class="hidden w-full h-full object-cover">
                            <span id="cam-placeholder" class="text-gray-500">Tap to Capture Geo-Image</span>
                        </div>
                        <button id="btn-submit-waste" disabled onclick="submitWaste()" class="gold-btn">Submit Geo-Tagged Waste</button>
                    </div>

                    <div class="card">
                        <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Terrace Garden</h2>
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-gray-300">Current Stage: <span class="${user.gardenStage === 3 ? 'text-green-500 font-bold' : 'gold-text'}">${user.gardenStage}/3</span></div>
                        </div>
                        <button onclick="updateGarden()" class="outline-btn w-full">Update Progress (+20 days)</button>
                    </div>
                </div>

                <div class="card">
                    <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">NGO Relief Hub</h2>
                    <div class="max-h-[500px] overflow-y-auto pr-2 space-y-4">
                        ${activeTickets.length === 0 ? '<p class="text-gray-500 italic">No active requests.</p>' : ''}
                        ${activeTickets.map(t => `
                            <div class="bg-[#111] p-4 rounded-lg border border-[#222]">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-semibold text-lg text-white">${t.type}</span>
                                    <span class="gold-text">${t.remQty.toFixed(1)}kg matching</span>
                                </div>
                                <div class="text-xs text-red-400 font-mono tracking-wider bg-red-900/20 px-2 py-1 rounded inline-block mb-3">
                                    EXPIRES: <span id="cit-timer-${t.id}">--:--</span>
                                </div>
                                <div class="flex gap-2">
                                    <input type="number" id="cit-don-${t.id}" placeholder="Qty" class="!mb-0" min="0.1" step="0.1" max="${t.remQty}">
                                    <button onclick="donateFood(${t.id})" class="outline-btn whitespace-nowrap !w-auto">Donate</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
      refreshLeaderboard(db);

      // Citizen Timers
      if (activeTickets.length > 0) {
        timerInterval = setInterval(() => {
          const now = Date.now();
          activeTickets.forEach(t => {
            const el = document.getElementById(`cit-timer-${t.id}`);
            if (el) {
              const ms = t.expiresAt - now;
              if (ms <= 0) render();
              else el.textContent = formatTime(ms);
            }
          });
        }, 1000);
      }
    }

    function handleCam(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        currentWasteImage = ev.target.result;
        const img = document.getElementById('waste-preview');
        img.src = currentWasteImage;
        img.classList.remove('hidden');
        document.getElementById('cam-placeholder').classList.add('hidden');
        document.getElementById('btn-submit-waste').disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function submitWaste() {
      if (!currentLoc.active) return alert("Waiting for stable GPS lock. Please ensure location is enabled.");
      if (!currentWasteImage) return alert("Please capture an image.");

      const btn = document.getElementById('btn-submit-waste');
      btn.disabled = true;

      const db = getDB();
      db.waste.push({
        id: Date.now(),
        userId: getSession().id,
        timestamp: Date.now(),
        lat: currentLoc.lat,
        lng: currentLoc.lng,
        address: currentLoc.addr,
        image: currentWasteImage,
        status: "pending"
      });
      saveDB(db);

      currentWasteImage = null;
      alert("Waste evidence submitted to live map.");
      render();
    }

    function updateGarden() {
      const db = getDB();
      const user = db.users.find(u => u.id === getSession().id);
      const now = Date.now();
      const cycle = 20 * 24 * 60 * 60 * 1000;

      if (user.lastGardenUpdate && (now - user.lastGardenUpdate) < cycle) {
        const left = Math.ceil((cycle - (now - user.lastGardenUpdate)) / 86400000);
        return alert(`Cycle locked. Wait ${left} more days.`);
      }

      if (user.gardenStage < 3) {
        user.gardenStage++;
        user.lastGardenUpdate = now;
        if (user.gardenStage === 3) {
          user.wallet += 50;
          db.reserve -= 50;
          user.gardenStage = 0; // Reset
          saveDB(db);
          alert("Stage 3 completed! +50 Z Coins deposited.");
        } else {
          saveDB(db);
          alert(`Advanced to Stage ${user.gardenStage}. Progress saved.`);
        }
        render();
      }
    }

    function donateFood(tId) {
      const qty = parseFloat(document.getElementById(`cit-don-${tId}`).value);
      if (isNaN(qty) || qty <= 0) return;

      const db = getDB();
      const ticket = db.tickets.find(t => t.id === tId);
      if (!ticket || ticket.status !== 'active') return alert("Ticket invalid.");
      if (qty > ticket.remQty) return alert("Quantity exceeds demand.");

      ticket.remQty -= qty;
      if (ticket.remQty <= 0) {
        ticket.remQty = 0;
        ticket.status = "fulfilled";
      }
      saveDB(db);
      render();
    }

    /* ==============================================
       WORKER PORTAL & LIVE MAP
       ============================================== */
    function renderWorker(container, db, user) {
      const pendingW = db.waste.filter(w => w.status === 'pending');
      const foods = db.tickets.filter(t => t.status === 'fulfilled');

      container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Wallet</div>
                    <div class="text-4xl font-bold gold-text">${user.wallet} ZC</div>
                    <button onclick="requestWithdrawal()" class="outline-btn mt-4 w-full">Withdraw</button>
                </div>
                <!-- Dynamic Live Map -->
                <div class="card md:col-span-3 h-[250px] p-0 overflow-hidden relative border border-[#333]">
                    <div id="worker-map" class="w-full h-full object-cover z-0"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="card">
                    <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Live Waste Radar</h2>
                    <div class="max-h-[500px] overflow-y-auto pr-2 space-y-4" id="waste-radar-list">
                        ${pendingW.length === 0 ? '<p class="text-gray-500 italic">No targets on radar.</p>' : ''}
                        ${pendingW.map(w => `
                            <div class="bg-[#111] p-4 rounded-lg border border-[#222]">
                                <div class="flex gap-4">
                                    <img src="${w.image}" class="w-20 h-20 object-cover rounded border border-[#333]" alt="waste">
                                    <div class="flex-1">
                                        <div class="text-sm text-gray-300 truncate mb-1" title="${w.address}">${w.address}</div>
                                        <div class="text-xs gold-text font-mono mb-2 DIST-MARKER" id="dist-${w.id}">Dist: Calc...</div>
                                        <button id="verify-btn-${w.id}" disabled onclick="verifyWaste(${w.id})" class="gold-btn !py-2 !text-sm flex-1 opacity-40 cursor-not-allowed transition-all">Verify Sector (<500m)</button>
                                    </div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>

                <div class="card">
                    <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Logistics Routing</h2>
                    <div class="space-y-4">
                        ${foods.length === 0 ? '<p class="text-gray-500 italic">No cleared cargo.</p>' : ''}
                        ${foods.map(t => `
                            <div class="bg-[#111] p-4 rounded-lg border border-[#222] flex justify-between items-center">
                                <div>
                                    <div class="font-bold text-white text-lg">${t.type}</div>
                                    <div class="text-sm gold-text">${t.totalQty}kg Ready</div>
                                </div>
                                <button onclick="deliverFood(${t.id})" class="outline-btn !w-auto !py-2">Log Delivery</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;

      // Initialize Map
      setTimeout(() => {
        if (!document.getElementById('worker-map')) return;
        globalLeafletMap = L.map('worker-map').setView([currentLoc.lat || 0, currentLoc.lng || 0], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(globalLeafletMap);

        // Worker Marker
        const workerIcon = L.divIcon({ className: 'custom-icon', html: '<div class="w-4 h-4 rounded-full bg-blue-500 border-2 border-white shadow-[0_0_10px_#3b82f6]"></div>' });
        mapWorkerMarker = L.marker([currentLoc.lat || 0, currentLoc.lng || 0], { icon: workerIcon }).addTo(globalLeafletMap)
          .bindPopup('Self (Live)');

        // Waste Markers
        const wasteIcon = L.divIcon({ className: 'custom-icon', html: '<div class="w-4 h-4 rounded-full bg-[#D4AF37] border-2 border-white shadow-[0_0_10px_#D4AF37]"></div>' });
        pendingW.forEach(w => {
          L.marker([w.lat, w.lng], { icon: wasteIcon }).addTo(globalLeafletMap)
            .bindPopup(`<img src="${w.image}" class="w-32 h-24 object-cover">`);
        });

        // Trigger initial distance calculation
        window.onLocationUpdated = updateWorkerDistances;
        if (currentLoc.active) updateWorkerDistances();
      }, 100);
    }

    function updateWorkerDistances() {
      if (!currentLoc.active) return;
      const db = getDB();
      const pendingW = db.waste.filter(w => w.status === 'pending');

      pendingW.forEach(w => {
        const btn = document.getElementById(`verify-btn-${w.id}`);
        const distTxt = document.getElementById(`dist-${w.id}`);
        if (btn && distTxt) {
          const dist = getDistance(currentLoc.lat, currentLoc.lng, w.lat, w.lng);
          distTxt.innerText = `Dist: ${Math.round(dist)}m`;

          if (dist <= 500) {
            btn.disabled = false;
            btn.classList.remove('opacity-40', 'cursor-not-allowed');
          } else {
            btn.disabled = true;
            btn.classList.add('opacity-40', 'cursor-not-allowed');
          }
        }
      });
    }

    function verifyWaste(wId) {
      const db = getDB();
      const w = db.waste.find(x => x.id === wId);
      if (!w || w.status !== 'pending') return;

      const dist = getDistance(currentLoc.lat, currentLoc.lng, w.lat, w.lng);
      if (dist <= 500) {
        w.status = 'verified';
        const cit = db.users.find(u => u.id === w.userId);
        const work = db.users.find(u => u.id === getSession().id);
        cit.wallet += 10;
        work.wallet += 15;
        db.reserve -= 25;
        saveDB(db);
        alert("Verification secure. Z Coins deposited to citizen and worker.");
        render();
      } else {
        alert("Radius breached. Move closer to the target.");
      }
    }

    function deliverFood(tId) {
      const db = getDB();
      const ticket = db.tickets.find(t => t.id === tId);
      if (!ticket || ticket.status !== "fulfilled") return;
      ticket.status = "delivered";
      const worker = db.users.find(u => u.id === getSession().id);
      worker.wallet += 20;
      db.reserve -= 20;
      saveDB(db);
      alert("Cargo delivered securely. Logistics reward deposited.");
      render();
    }

    function requestWithdrawal() {
      const amtStr = prompt("Amount to extract to fiat layer (Min 100):");
      if (!amtStr) return;
      const amt = parseFloat(amtStr);
      if (isNaN(amt) || amt < 100) return alert("Minimum withdrawal criteria not met (100 ZC).");
      const db = getDB();
      const user = db.users.find(u => u.id === getSession().id);
      if (user.wallet < amt) return alert("Insufficient block balance.");

      user.wallet -= amt;
      db.withdrawals.push({ id: Date.now(), userId: user.id, email: user.email, amount: amt, status: "pending" });
      saveDB(db);
      alert("Extraction packet requested from Admin.");
      render();
    }

    /* ==============================================
       NGO PORTAL
       ============================================== */
    function renderNGO(container, db) {
      const sortedTickets = [...db.tickets].reverse();

      container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="card md:col-span-1 border-t-2 border-t-[var(--gold)]">
                    <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Generate Ticket</h2>
                    <p class="text-sm text-gray-400 mb-6">Open supply request. Auto-terminates in 30m.</p>
                    <form id="form-ngo-ticket" onsubmit="createTicket(event)">
                        <input type="text" id="t-type" placeholder="Resource Type (e.g., Rice)" required>
                        <input type="number" id="t-qty" placeholder="Gross Mass (kg)" required min="1" step="0.1">
                        <button type="submit" class="gold-btn mt-2">Broadcast Signal</button>
                    </form>
                </div>

                <div class="card md:col-span-2">
                    <h2 class="text-xl gold-text font-semibold mb-4 border-b border-[#333] pb-2">Global Tracker</h2>
                    <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                        ${sortedTickets.length === 0 ? '<p class="text-gray-500 italic">No signals active.</p>' : ''}
                        ${sortedTickets.map(t => {
        let stat = "text-yellow-500 border-yellow-500";
        if (t.status === "fulfilled") stat = "text-green-500 border-green-500";
        if (t.status === "delivered") stat = "text-blue-500 border-blue-500";
        if (t.status === "expired") stat = "text-red-500 border-red-500";

        return `
                            <div class="bg-[#111] p-4 rounded-lg flex justify-between items-center border border-[#222]">
                                <div>
                                    <div class="font-bold text-lg text-white mb-1">${t.type}</div>
                                    <span class="uppercase text-[10px] px-2 py-1 border rounded ${stat}">${t.status}</span>
                                    <div class="text-sm text-gray-400 mt-2">Rem: <span class="gold-text">${t.remQty}kg</span> / ${t.totalQty}kg</div>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    ${t.status === 'active' ? `<div id="ngo-tim-${t.id}" class="text-red-400 font-mono text-sm bg-red-900/10 px-3 py-1 rounded">--:--</div>` : ''}
                                </div>
                            </div>
                            `;
      }).join("")}
                    </div>
                </div>
            </div>
        `;

      if (sortedTickets.some(t => t.status === 'active')) {
        timerInterval = setInterval(() => {
          const now = Date.now();
          sortedTickets.forEach(t => {
            if (t.status === 'active') {
              const el = document.getElementById(`ngo-tim-${t.id}`);
              if (el) {
                const ms = t.expiresAt - now;
                if (ms <= 0) render();
                else el.textContent = formatTime(ms);
              }
            }
          });
        }, 1000);
      }
    }

    function createTicket(e) {
      e.preventDefault();
      const type = document.getElementById('t-type').value.trim();
      const qty = parseFloat(document.getElementById('t-qty').value);
      if (!type || isNaN(qty) || qty <= 0) return;

      const db = getDB();
      db.tickets.push({
        id: Date.now(),
        type,
        totalQty: qty,
        remQty: qty,
        createdAt: Date.now(),
        expiresAt: Date.now() + (30 * 60 * 1000),
        status: "active"
      });
      saveDB(db);
      render();
    }

    /* ==============================================
       ADMIN PORTAL
       ============================================== */
    function renderAdmin(container, db) {
      const totalW = db.waste.length;
      const distZc = db.users.reduce((sum, u) => sum + (u.id === 1 ? 0 : u.wallet), 0);
      const resZc = db.reserve;
      const den = resZc + distZc;
      const ratio = den > 0 ? ((resZc / den) * 100).toFixed(1) : 100;

      let rColor = "text-green-500";
      if (ratio < 40 && ratio >= 20) rColor = "text-yellow-500";
      if (ratio < 20) rColor = "text-red-500";

      const pDraws = db.withdrawals.filter(w => w.status === "pending");

      container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Total Waste Cleared</div>
                    <div class="text-3xl font-bold text-white">${totalW}</div>
                </div>
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Circulating Supply</div>
                    <div class="text-3xl font-bold gold-text">${distZc} ZC</div>
                </div>
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Treasury Reserve</div>
                    <div class="text-3xl font-bold text-white">${resZc} ZC</div>
                </div>
                <div class="card text-center">
                    <div class="text-sm text-gray-400 uppercase tracking-wider mb-2">Health Ratio</div>
                    <div class="text-3xl font-bold ${rColor}">${ratio}%</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="card lg:col-span-1 flex flex-col items-center justify-center">
                    <h2 class="text-lg gold-text font-semibold mb-6 text-center w-full">Ecosystem Balance</h2>
                    <div class="w-full h-64 relative">
                        <canvas id="ecoChart"></canvas>
                    </div>
                </div>

                <div class="space-y-8 lg:col-span-2">
                    <div class="card">
                        <h2 class="text-lg gold-text font-semibold mb-4 border-b border-[#333] pb-2">Pending Treasury Extractions</h2>
                        <div class="space-y-3 max-h-[250px] overflow-y-auto pr-2">
                            ${pDraws.length === 0 ? '<p class="text-gray-500 italic">No packet requests.</p>' : ''}
                            ${pDraws.map(w => `
                                <div class="bg-[#111] p-3 rounded-lg border border-[#222] flex justify-between items-center">
                                    <div>
                                        <div class="font-bold text-white">${w.email}</div>
                                        <div class="text-sm gold-text">${w.amount} ZC</div>
                                    </div>
                                    <button onclick="approveWithdrawal(${w.id})" class="outline-btn !text-green-500 !border-green-500 hover:!bg-green-900/20 !w-auto !py-2">Approve Execution</button>
                                </div>
                            `).join("")}
                        </div>
                    </div>

                    <div class="card">
                        <h2 class="text-lg gold-text font-semibold mb-4 border-b border-[#333] pb-2">Top Protocol Citizens</h2>
                        <div id="dynamic-leaderboard" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        `;
      refreshLeaderboard(db);

      setTimeout(() => {
        const ctx = document.getElementById('ecoChart');
        if (ctx) {
          Chart.defaults.color = '#888';
          new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['Treasury Reserve', 'Circulating Supply'],
              datasets: [{
                data: [resZc, distZc],
                backgroundColor: ['#111', '#D4AF37'],
                borderColor: ['#333', '#111'],
                borderWidth: 2
              }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { padding: 20 } } } }
          });
        }
      }, 100);
    }

    function approveWithdrawal(wId) {
      const db = getDB();
      const w = db.withdrawals.find(x => x.id === wId);
      if (!w || w.status !== "pending") return;

      if (db.reserve >= w.amount) {
        db.reserve -= w.amount;
        w.status = "approved";
        saveDB(db);
        alert("Treasury extraction authorized.");
        render();
      } else {
        alert("Insufficient Treasury Reserve.");
      }
    }

    /* ==============================================
       SYSTEM STARTUP
       ============================================== */
    window.onload = render;

  </script>
</body>

</html>
