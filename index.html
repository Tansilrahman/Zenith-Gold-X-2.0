<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Gold X</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    /* Premium wave background */
    #waveCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    /* Particle layer */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .card {
      background: rgba(26, 26, 26, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .gold {
      color: #D4AF37;
    }

    .gold-btn {
      background: linear-gradient(135deg, #FFDF73 0%, #D4AF37 50%, #B89222 100%);
      color: black;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
    }

    .gold-btn:hover {
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
      transform: translateY(-2px);
    }

    /* Custom premium scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.4);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 175, 55, 0.8);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <canvas id="waveCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>

  <!-- Persistent Logo -->
  <div class="fixed top-6 left-6 z-50 flex items-center gap-3">
    <img src="logo.png" class="w-10 h-10 rounded" />
    <h1 class="text-yellow-400 font-bold tracking-widest text-lg">
      ZENITH GOLD X
    </h1>
  </div>

  <div id="app" class="relative z-10 w-full min-h-screen"></div>

  <script>
    function showToast(msg) {
      const container = document.getElementById("toastContainer");
      if (!container) return;
      const el = document.createElement("div");
      el.className = "px-6 py-3 rounded shadow-2xl font-mono text-xs backdrop-blur-md bg-black/80 border border-yellow-500/50 text-yellow-400 transform transition-all duration-300 translate-x-20 opacity-0 pointer-events-auto shadow-[0_4px_20px_rgba(212,175,55,0.2)]";
      el.innerText = msg;
      container.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.remove("translate-x-20", "opacity-0");
      });
      setTimeout(() => {
        el.classList.add("translate-x-20", "opacity-0");
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    /* =========================
       ZGX MASTER DATABASE ENGINE
    ========================= */

    const DB_KEY = "ZGX_DB";

    /* Initialize Database */
    function initializeDB() {

      const db = {
        users: [
          { id: 1, email: "tansil@admin", password: "123", role: "admin", wallet: 0 },
          { id: 2, email: "tansil@user", password: "123", role: "citizen", wallet: 0, co2: 0, gardenStage: 0 },
          { id: 3, email: "tansil@worker", password: "123", role: "worker", wallet: 0, completed: 0 },
          { id: 4, email: "tansil@ngo", password: "123", role: "ngo", wallet: 0 }
        ],

        wasteSubmissions: [],
        foodTickets: [],
        withdrawals: [],
        gardens: [],
        reserve: 50000
      };

      localStorage.setItem(DB_KEY, JSON.stringify(db));
      return db;
    }

    /* Load Database Safely */
    function getDB() {

      let raw = localStorage.getItem(DB_KEY);

      if (!raw) {
        return initializeDB();
      }

      try {

        const db = JSON.parse(raw);

        if (!db.users) db.users = [];
        if (!db.wasteSubmissions) db.wasteSubmissions = [];
        if (!db.foodTickets) db.foodTickets = [];
        if (!db.withdrawals) db.withdrawals = [];
        if (!db.gardens) db.gardens = [];

        return db;

      } catch {

        return initializeDB();

      }
    }

    /* Save Database */
    function saveDB(db) {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    /* =========================
       SESSION ENGINE
    ========================= */

    let currentUser = null;

    try {
      currentUser = JSON.parse(localStorage.getItem("ZGX_SESSION"));
    } catch {
      currentUser = null;
    }

    function setSession(user) {
      localStorage.setItem("ZGX_SESSION", JSON.stringify(user));
      currentUser = user;
    }

    function clearSession() {
      localStorage.removeItem("ZGX_SESSION");
      currentUser = null;
    }

    /* =========================
       HAVERSINE DISTANCE (meters)
    ========================= */
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    /* =========================
       BASIC ROUTER
    ========================= */
    function render() {
      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }
    }

    function renderLogin() {
      document.getElementById("app").innerHTML = `
  <div class="min-h-screen flex items-center justify-center">
    <div class="card p-10 rounded-xl w-full max-w-md shadow-xl border border-yellow-500/30">
      <h2 class="text-3xl font-bold mb-6 gold text-center uppercase tracking-widest">Zenith Gold X</h2>

      <input id="email" placeholder="Email (e.g. tansil@user)"
        class="w-full p-3 mb-4 rounded bg-black border border-gray-700 outline-none focus:border-yellow-500"/>

      <input id="password" type="password" placeholder="Password (123)"
        class="w-full p-3 mb-6 rounded bg-black border border-gray-700 outline-none focus:border-yellow-500"/>

      <button onclick="login()"
        class="gold-btn w-full py-3 rounded uppercase tracking-widest">Login</button>

      <p id="loginError" class="text-red-500 text-center mt-4 hidden">
        Invalid Credentials
      </p>

      <div class="text-gray-500 text-xs mt-6 text-center font-mono">
        Demo Accounts:<br/>
        tansil@admin | tansil@user<br/>
        tansil@worker | tansil@ngo<br/>
        Password: 123
      </div>
    </div>
  </div>
  `;
    }

    /* =========================
       LOGIN SYSTEM
    ========================= */

    function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const db = getDB();

      const user = db.users.find(
        u => u.email === email && u.password === password
      );

      if (!user) {

        const error = document.getElementById("loginError");

        if (error) {
          error.classList.remove("hidden");
        }

        return;

      }


      if (!db.loginLogs) db.loginLogs = [];
      db.loginLogs.push({ email: user.email, role: user.role, time: Date.now() });
      saveDB(db);
      setSession(user);

      render();

    }

    /* =========================
       LOGOUT
    ========================= */

    function logout() {

      clearSession();

      render();

    }

    function updateBanner() {
      const db = getDB();
      const active = db.foodTickets.some(t => t.status === "open");
      let banner = document.getElementById("globalNgoBanner");

      let dbUpdated = false;
      const now = Date.now();
      db.foodTickets.forEach(t => {
        if (t.status === 'open' && t.expiry && now > t.expiry) {
          t.status = 'expired';
          dbUpdated = true;
        }
      });
      if (dbUpdated) saveDB(db);

      if (active && currentUser) {
        if (!banner) {
          banner = document.createElement("div");
          banner.id = "globalNgoBanner";
          banner.className = "w-full bg-blue-900/90 text-blue-200 text-xs text-center py-2 font-mono uppercase tracking-widest border-b border-blue-500/50 fixed top-0 z-40 shadow-[0_0_15px_rgba(59,130,246,0.5)]";
          banner.innerHTML = "Active NGO Asset Demands on Network! Support logistics to earn ZC.";
          document.body.appendChild(banner);
        }
      } else {
        if (banner) banner.remove();
      }
    }

    function renderDashboard() {
      updateBanner();

      if (!currentUser) {
        let banner = document.getElementById("globalNgoBanner");
        if (banner) banner.remove();
        renderLogin();
        return;
      }

      if (currentUser.role === "citizen") renderCitizen();
      if (currentUser.role === "worker") renderWorker();
      if (currentUser.role === "ngo") renderNGO();
      if (currentUser.role === "admin") renderAdmin();
    }

    /* =========================
       CITIZEN ENGINE
    ========================= */
    function renderCitizen() {
      const db = getDB();
      const user = db.users.find(u => u.id === currentUser.id);

      const leaderboard = [...db.users]
        .filter(u => u.role === "citizen")
        .sort((a, b) => b.wallet - a.wallet);

      document.getElementById("app").innerHTML = `
  <div class="p-10 max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
      <div>
        <h2 class="text-2xl gold font-bold uppercase tracking-widest">Citizen Dashboard</h2>
        <p class="text-xs text-gray-500 font-mono mt-1">Node: ${user.email}</p>
      </div>
      <button onclick="logout()" class="border border-red-500/50 text-red-500 px-4 py-2 rounded uppercase tracking-widest text-xs hover:bg-red-500/10 transition-colors">Logout</button>
    </div>

    <div class="grid md:grid-cols-3 gap-6 mb-10">
      <div class="card p-6 rounded shadow-lg border-l-2 border-yellow-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Z Coins</div>
        <div class="text-4xl gold font-mono">${user.wallet}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-green-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">CO₂ Saved</div>
        <div class="text-4xl gold font-mono">${user.co2 || 0}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-blue-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Garden Stage</div>
        <div class="text-4xl gold font-mono">${user.gardenStage || 0}/3</div>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
        <div>
            <div class="card p-6 rounded mb-8 shadow-lg border border-gray-800">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Offer Exchange</h3>
              <div class="flex flex-col gap-3">
                  <button onclick="redeemVoucher()" class="gold-btn px-4 py-3 rounded text-sm uppercase">
                    Redeem 200 Z Coins → Voucher
                  </button>
                  <button onclick="redeemUPI()" class="border border-yellow-500 text-yellow-500 hover:bg-yellow-500/10 px-4 py-3 rounded text-sm uppercase transition-colors">
                    Redeem 500 Z Coins → UPI Transfer
                  </button>
              </div>
            </div>

            <div class="card p-6 rounded mb-8 shadow-lg border border-gray-800">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Withdraw Z Coins</h3>
              <input type="number" id="withdrawAmount"
                placeholder="Enter amount (Min 100)"
                class="mb-4 w-full p-3 bg-black border border-gray-700 rounded font-mono text-sm outline-none focus:border-yellow-500"/>
              <button onclick="requestWithdrawal()" class="gold-btn w-full px-6 py-3 rounded uppercase text-sm font-bold">
                Request Withdrawal
              </button>
            </div>

            <div class="card p-6 rounded mb-8 shadow-lg border border-gray-800">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Leaderboard</h3>
              ${leaderboard.map((u, i) => `
                  <div class="p-3 rounded mb-2 font-mono text-sm flex justify-between ${i === 0 ? 'bg-[#D4AF37] text-black font-semibold' : 'border border-gray-800 bg-gray-900'}">
                    <span>#${i + 1} ${u.email.split('@')[0]}</span>
                    <span>${u.wallet} ZC</span>
                  </div>
                `).join("")
        }
            </div>
        </div>

        <div>
            <div class="card p-6 rounded mb-8 shadow-lg border border-blue-500/30">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Food Logistics</h3>
              ${db.foodTickets.filter(t => t.status === 'open').length === 0
          ? '<p class="text-xs text-gray-500 italic mb-4">No open NGO ledgers.</p>'
          : `<select id="foodLedger" class="mb-3 w-full p-3 bg-black border border-gray-700 rounded text-xs text-gray-300 outline-none focus:border-yellow-500">
                     <option value="">-- Select Active Ledger --</option>
                     ${db.foodTickets.filter(t => t.status === 'open').map(t => `<option value="${t.id}">${t.item} (Needs ${t.remainingQty})</option>`).join('')}
                   </select>
                   <input type="number" id="foodQty" placeholder="Volume to Transfer" class="mb-4 w-full p-3 bg-black border border-gray-700 rounded text-xs font-mono outline-none focus:border-yellow-500"/>
                   <button onclick="submitFood()" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white w-full px-6 py-3 rounded uppercase text-sm font-bold shadow-lg">
                     Transfer Assets
                   </button>`
        }
            </div>

            <div class="card p-6 rounded mb-8 shadow-lg border border-green-500/30">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Terrace Garden</h3>
              <div class="flex gap-4 mb-4">
                <input type="number" id="plantCount" min="0" placeholder="Plants" class="w-1/2 p-2 bg-black border border-gray-700 rounded text-xs outline-none focus:border-yellow-500"/>
                <input type="number" id="treeCount" min="0" placeholder="Trees" class="w-1/2 p-2 bg-black border border-gray-700 rounded text-xs outline-none focus:border-yellow-500"/>
              </div>
              <input type="file" accept="image/*" capture="environment" id="gardenPhoto"
                class="mb-4 w-full p-2 bg-black border border-gray-700 rounded text-xs"/>
              <button onclick="updateGarden()" class="bg-green-600 hover:bg-green-700 transition-colors text-white w-full px-6 py-3 rounded uppercase text-sm font-bold">
                Submit Garden Update
              </button>
              <div class="mt-4 text-xs text-gray-500 font-mono">
                3 successful updates required.<br/>20 days required between updates.
              </div>
            </div>

            <div class="card p-6 rounded shadow-lg border border-yellow-500/30">
              <h3 class="gold mb-4 uppercase tracking-widest font-bold">Upload Waste</h3>
              <input type="file" accept="image/*" capture="environment" id="wastePhoto"
                class="mb-4 w-full p-2 bg-black border border-gray-700 rounded text-xs"/>
              <div id="map" style="height:300px;" class="mb-4 rounded border border-gray-800"></div>
              <button id="wasteSubmitBtn" onclick="submitWaste()" class="gold-btn w-full px-6 py-3 rounded uppercase text-sm font-bold">
                Capture Location & Submit
              </button>
            </div>
        </div>
    </div>
  </div>
  `;
      initializeMap();
    }

    let map = null;
    let currentLat = null;
    let currentLng = null;

    function initializeMap() {
      try {
        const mapContainer = document.getElementById('map');
        if (!mapContainer) return;

        if (map) {
          map.remove();
          map = null;
        }
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);

        const geoOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(position => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;
          if (map) {
            map.setView([currentLat, currentLng], 15);
            L.marker([currentLat, currentLng]).addTo(map)
              .bindPopup("Your Location")
              .openPopup();
          }
        }, error => {
          console.error("Geolocation Error:", error);
          showToast("Location permission required to use map features.");
        }, geoOptions);
      } catch (e) {
        console.error("Map Initialization Error:", e);
      }
    }

    function submitWaste() {
      try {
        const photo = document.getElementById("wastePhoto").files[0];
        if (!photo) { showToast("Please upload waste photo."); return; }
        if (photo.size < 1024 * 10) { showToast("AI Confidence Low: File size < 10kb. Rejected."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        const db = getDB();
        const pendingCheck = db.wasteSubmissions.find(s => s.userId === currentUser.id && s.status === "pending");
        if (pendingCheck) { showToast("You already have a pending submission."); return; }

        const btn = document.getElementById("wasteSubmitBtn");
        if (btn) {
          btn.innerHTML = "Verifying... (AI 92%)";
          btn.disabled = true;
        }

        setTimeout(() => {
          try {
            const currentDb = getDB();
            currentDb.wasteSubmissions.push({
              id: Date.now(),
              userId: currentUser.id,
              lat: currentLat,
              lng: currentLng,
              status: "pending"
            });
            saveDB(currentDb);

            showToast("Waste submitted successfully. Waiting for worker verification.");
            renderCitizen();
          } catch (e) {
            console.error("Waste Submit Timeout Error:", e);
            if (btn) {
              btn.innerHTML = "Capture Location & Submit";
              btn.disabled = false;
            }
          }
        }, 1500);
      } catch (e) {
        console.error("Waste Submit Error:", e);
      }
    }

    function updateGarden() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);

        if (user.gardenStage >= 3) { showToast("Garden reward already completed."); return; }

        const plants = parseInt(document.getElementById("plantCount")?.value) || 0;
        const trees = parseInt(document.getElementById("treeCount")?.value) || 0;

        const photo = document.getElementById("gardenPhoto").files[0];
        if (!photo) { showToast("Upload garden photo."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        if (user.gardenLat && user.gardenLng) {
          if (getDistance(currentLat, currentLng, user.gardenLat, user.gardenLng) > 500) {
            showToast("Location mismatch! You must upload from your registered garden location within 500m.");
            return;
          }
        } else {
          user.gardenLat = currentLat;
          user.gardenLng = currentLng;
        }

        const now = new Date().getTime();
        if (user.lastGardenUpdate) {
          const diff = now - user.lastGardenUpdate;
          const days = diff / (1000 * 60 * 60 * 24);
          if (days < 20) { showToast("You must wait 20 days between garden updates."); return; }
        }

        user.gardenStage = (user.gardenStage || 0) + 1;
        user.lastGardenUpdate = now;

        const reward = (plants * 1) + (trees * 5);
        const co2Gain = (plants * 0.5) + (trees * 5);

        user.wallet += reward;
        user.co2 = (user.co2 || 0) + co2Gain;
        db.reserve -= reward;

        if (user.gardenStage === 3) {
          user.wallet += 50;
          db.reserve -= 50;
          showToast(`Garden milestone completed! 50 ZC credited + ${reward} ZC based on plants/trees.`);
        } else {
          showToast(`Garden update recorded. Stage ${user.gardenStage}/3. Earned ${reward} Z Coins.`);
        }

        saveDB(db);
        renderCitizen();
      } catch (e) {
        console.error("Update Garden Error:", e);
      }
    }

    function submitFood() {

      const db = getDB();

      const ledgerId = document.getElementById("foodLedger").value;
      const qty = parseInt(document.getElementById("foodQty").value);

      const ticket = db.foodTickets.find(
        t => t.id.toString() === ledgerId.toString()
      );

      if (!ticket) return;

      ticket.remainingQty -= qty;

      ticket.contributors.push({
        user: currentUser.email,
        qty: qty,
        time: Date.now()
      });

      if (ticket.remainingQty <= 0) {
        ticket.status = "closed";
      }

      const user = db.users.find(u => u.id === currentUser.id);

      user.wallet += qty * 2;

      saveDB(db);

      showToast("Food donated");

      renderCitizen();
    }

    function requestWithdrawal() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);
        const amtEl = document.getElementById("withdrawAmount");
        const amount = amtEl ? parseInt(amtEl.value) : 0;

        if (!amount || amount < 100) { showToast("Minimum withdrawal is 100 Z Coins."); return; }
        if (user.wallet < amount) { showToast("Insufficient balance."); return; }

        user.wallet -= amount;
        db.withdrawals.push({
          id: Date.now(),
          userId: user.id,
          amount: amount,
          status: "pending"
        });

        saveDB(db);
        showToast("Withdrawal request submitted for admin approval.");
        if (amtEl) amtEl.value = "";
        renderCitizen();
      } catch (e) {
        console.error("Request Withdrawal Error:", e);
      }
    }

    function redeemVoucher() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);

        if (user.wallet < 200) { showToast("Not enough Z Coins."); return; }
        user.wallet -= 200;
        db.reserve -= 200;
        saveDB(db);

        showToast("Voucher redeemed successfully.");
        renderCitizen();
      } catch (e) {
        console.error("Redeem Voucher Error:", e);
      }
    }

    function redeemUPI() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);

        if (user.wallet < 500) { showToast("Not enough Z Coins."); return; }
        const confirmPass = prompt("Enter password to confirm UPI transfer:");
        if (confirmPass !== currentUser.password) { showToast("Authentication failed."); return; }

        user.wallet -= 500;
        db.reserve -= 500;
        saveDB(db);

        showToast("UPI transfer initiated (Simulated).");
        renderCitizen();
      } catch (e) {
        console.error("Redeem UPI Error:", e);
      }
    }

    /* =========================
       WORKER ENGINE
    ========================= */
    function renderWorker() {
      const db = getDB();
      const worker = db.users.find(u => u.id === currentUser.id);

      document.getElementById("app").innerHTML = `
  <div class="p-10 max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
      <div>
        <h2 class="text-2xl gold font-bold uppercase tracking-widest">Worker Dashboard</h2>
        <p class="text-xs text-gray-500 font-mono mt-1">Node: ${worker.email}</p>
      </div>
      <button onclick="logout()" class="border border-red-500/50 text-red-500 px-4 py-2 rounded uppercase tracking-widest text-xs hover:bg-red-500/10 transition-colors">Logout</button>
    </div>

    <div class="card p-6 rounded shadow-lg border-l-2 border-yellow-500 mb-8 max-w-xs">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Your Wallet</div>
        <div class="text-4xl gold font-mono">${worker.wallet}</div>
    </div>

    <div class="card p-6 rounded shadow-lg border border-gray-800">
      <h3 class="gold mb-4 uppercase tracking-widest font-bold">Pending Waste Nearby</h3>
      <div id="workerMap" style="height:400px;" class="mb-6 rounded border border-gray-700"></div>
      <h4 class="text-xs uppercase tracking-widest text-gray-500 mb-2 border-b border-gray-800 pb-2">Geospatial Validation Buffer</h4>
      <div id="pendingList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4"></div>
    </div>
  </div>
  `;
      initializeWorkerMap();
    }

    let workerLat = null;
    let workerLng = null;
    let workerMap;

    function initializeWorkerMap() {
      try {
        const mapContainer = document.getElementById('workerMap');
        if (!mapContainer) return;

        if (workerMap) {
          workerMap.remove();
          workerMap = null;
        }
        workerMap = L.map('workerMap').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(workerMap);

        const geoOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(position => {
          workerLat = position.coords.latitude;
          workerLng = position.coords.longitude;
          if (workerMap) {
            workerMap.setView([workerLat, workerLng], 15);
            L.marker([workerLat, workerLng])
              .addTo(workerMap)
              .bindPopup("Worker Location")
              .openPopup();
          }
          loadPendingSubmissions();
        }, error => {
          console.error("Worker Geolocation Error:", error);
          showToast("Location permission required for worker mapping.");
        }, geoOptions);
      } catch (e) {
        console.error("Worker Map Init Error:", e);
      }
    }

    function loadPendingSubmissions() {
      try {
        const db = getDB();
        const pending = db.wasteSubmissions.filter(s => s.status === "pending");
        const container = document.getElementById("pendingList");
        if (!container) return;

        container.innerHTML = "";

        if (pending.length === 0) {
          container.innerHTML = "<p class='text-gray-400 text-sm'>No pending waste nearby.</p>";
          return;
        }

        pending.forEach(sub => {
          const distance = getDistance(workerLat, workerLng, sub.lat, sub.lng);
          const div = document.createElement("div");
          div.className = "bg-gray-900 border border-gray-700 shadow p-4 rounded text-sm flex justify-between items-center";

          div.innerHTML = `
        <div>
            <div class="gold font-mono mb-1 text-xs">ID: ${sub.id}</div>
            <div class="text-gray-400 font-mono text-[10px]">Distance: ${(distance / 1000).toFixed(2)} km</div>
        </div>
        <div>
        ${distance <= 500
              ? `<button onclick="verifyWaste(${sub.id})" class="bg-green-600 hover:bg-green-500 text-white font-bold px-4 py-2 rounded text-xs uppercase uppercase transition-colors shadow">Verify <span class="text-[10px] opacity-70 block -mt-1">< 500m</span></button>`
              : `<span class="text-red-400 text-[10px] uppercase font-bold border border-red-500/30 px-2 py-1 rounded">Out of Range</span>`
            }
        </div>
      `;
          container.appendChild(div);

          if (workerMap) {
            L.marker([sub.lat, sub.lng])
              .addTo(workerMap)
              .bindPopup("Pending Waste Entry");
          }
        });
      } catch (e) {
        console.error("Load Submissions Error:", e);
      }
    }

    function verifyWaste(id) {
      try {
        const db = getDB();
        const submission = db.wasteSubmissions.find(s => s.id === id);

        if (!submission || submission.status !== "pending") { showToast("Already verified."); return; }

        if (workerLat === null || workerLng === null) {
          showToast("Worker location not captured.");
          return;
        }

        const distance = getDistance(workerLat, workerLng, submission.lat, submission.lng);
        if (distance > 500) { showToast("You must be within 500 meters to verify."); return; }

        submission.status = "verified";

        const citizen = db.users.find(u => u.id === submission.userId);
        const worker = db.users.find(u => u.id === currentUser.id);

        if (citizen) citizen.wallet += 10;
        if (worker) {
          worker.wallet += 15;

          const today = new Date().toISOString().split('T')[0];
          if (worker.lastWorkDate !== today) {
            worker.dailyCount = 0;
            worker.lastWorkDate = today;
          }
          worker.dailyCount = (worker.dailyCount || 0) + 1;

          if (worker.dailyCount % 10 === 0) {
            worker.wallet += 20;
            db.reserve -= 20;
            showToast(`Milestone! 10 orders completed today. +20 ZC Bonus!`);
          }
        }
        db.reserve += 25;

        saveDB(db);
        showToast("Verification successful. Rewards distributed.");
        renderWorker();
      } catch (e) {
        console.error("Verify Waste Error:", e);
      }
    }

    /* =========================
       NGO ENGINE (Maintained consistency)
    ========================= */
    function renderNGO() {
      const db = getDB();
      const now = Date.now();

      let dbUpdated = false;
      db.foodTickets.forEach(t => {
        if (t.status === 'open' && t.expiry && now > t.expiry) {
          t.status = 'expired';
          dbUpdated = true;
        }
      });
      if (dbUpdated) saveDB(db);

      const myTickets = db.foodTickets.filter(t => t.ngoId === currentUser.id) || [];
      const totalRequested = myTickets.reduce((sum, t) => sum + t.requiredQty, 0);
      const totalFulfilled = myTickets.reduce((sum, t) => sum + (t.requiredQty - t.remainingQty), 0);

      document.getElementById("app").innerHTML = `
    <div class="p-10 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl text-yellow-400 font-bold uppercase tracking-widest">NGO Protocol</h1>
                <p class="text-xs text-gray-500 font-mono mt-1">Node: ${currentUser.email}</p>
            </div>
            <button onclick="logout()" class="border border-red-500/50 text-red-500 hover:bg-red-500/10 px-4 py-2 rounded text-xs uppercase tracking-widest transition-colors">Logout</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div class="card p-6 rounded shadow-xl border-l-2 border-blue-500">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Total Assets Requested</div>
                <div class="text-3xl gold font-mono">${totalRequested}</div>
            </div>
            <div class="card p-6 rounded shadow-xl border-l-2 border-green-500">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Assets Fulfilled</div>
                <div class="text-3xl gold font-mono">${totalFulfilled}</div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="card p-6 rounded shadow-xl border border-yellow-500/30 h-fit">
                <h3 class="gold font-bold uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Broadcast Demand Ledger</h3>
                <input id="ngoItem" placeholder="Target Asset Resource (e.g., Rice, Water)" class="w-full bg-black border border-gray-700 rounded p-3 mb-4 text-sm outline-none font-mono focus:border-yellow-500">
                <input id="ngoQty" type="number" placeholder="Required Quantity" class="w-full bg-black border border-gray-700 rounded p-3 mb-6 text-sm outline-none font-mono focus:border-yellow-500">
                <button onclick="raiseTicket()" class="gold-btn w-full px-3 py-3 rounded text-sm uppercase tracking-widest font-bold">Raise Global Ledger</button>
            </div>

            <div class="card p-6 rounded shadow-xl border border-gray-800">
                <h3 class="gold font-bold uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">Active Ledgers</h3>
                ${db.foodTickets.length === 0 ? '<p class="text-xs italic text-gray-600">No network ledgers active.</p>' : ''}
                <div class="space-y-4 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                    ${db.foodTickets.slice().reverse().map(f => {
        const timeLeft = f.expiry ? Math.max(0, f.expiry - Date.now()) : 0;
        const hrs = Math.floor(timeLeft / 3600000);
        const mins = Math.floor((timeLeft % 3600000) / 60000);
        return `
                        <div class="bg-gray-900 border ${f.status === 'open' ? 'border-blue-500/50' : (f.status === 'expired' ? 'border-red-500/50' : 'border-green-500/50')} p-4 rounded shadow-lg transition-all 0.3s hover:shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-yellow-400 font-bold uppercase text-sm">${f.item}</span>
                                <div class="flex gap-2 items-center">
                                  ${f.status === 'open' && f.expiry ? `<span class="text-[9px] text-gray-400 font-mono tracking-widest">${hrs}h ${mins}m left</span>` : ''}
                                  <span class="text-[10px] uppercase px-2 py-1 rounded ${f.status === 'open' ? 'bg-blue-900/50 text-blue-300' : (f.status === 'expired' ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300')}">${f.status}</span>
                                </div>
                            </div>
                            <div class="w-full bg-black rounded-full h-1.5 mb-2">
                                <div class="bg-blue-500 h-1.5 rounded-full" style="width: ${((f.requiredQty - f.remainingQty) / f.requiredQty) * 100}%"></div>
                            </div>
                            <div class="flex justify-between text-[10px] text-gray-400 font-mono">
                                <span>Fulfilled: ${f.requiredQty - f.remainingQty}</span>
                                <span>Req: ${f.requiredQty}</span>
                            </div>
                        </div>
                    `}).join('')}
                </div>
            </div>
        </div>
    </div>
  `;
    }

    function raiseTicket() {

      const item = document.getElementById("ngoItem").value.trim();
      const qty = parseInt(document.getElementById("ngoQty").value);

      if (!item || !qty || qty <= 0) {
        showToast("Invalid input");
        return;
      }

      const db = getDB();

      const ticket = {
        id: Date.now(),
        ngoId: currentUser.id,
        item: item,
        requiredQty: qty,
        remainingQty: qty,
        status: "open",
        expiry: Date.now() + (24 * 60 * 60 * 1000),
        contributors: []
      };

      db.foodTickets.push(ticket);

      saveDB(db);

      showToast("Ticket created");

      renderNGO();
    }

    /* =========================
       ADMIN ENGINE (Analytics & Withdrawals)
    ========================= */
    function renderAdmin() {
      const db = getDB();
      const totalUsers = db.users.length;
      const totalWaste = db.wasteSubmissions.length;
      const verifiedWaste = db.wasteSubmissions.filter(s => s.status === "verified").length;
      const totalDistributed = db.users.reduce((sum, u) => sum + (u.wallet || 0), 0);
      const reserve = db.reserve;
      const reserveRatio = totalDistributed === 0 ? 100 : ((reserve / (reserve + totalDistributed)) * 100).toFixed(2);
      let status = "Healthy";
      if (reserveRatio < 20) status = "Risk";
      else if (reserveRatio < 40) status = "Monitor";

      const pendingWithdrawals = db.withdrawals.filter(w => w.status === "pending");

      document.getElementById("app").innerHTML = "";
      document.getElementById("app").innerHTML = `
  <div class="p-10 max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
      <div>
        <h2 class="text-2xl gold font-bold uppercase tracking-widest">Admin Dashboard</h2>
        <p class="text-xs text-gray-500 font-mono mt-1">Node: ${currentUser.email}</p>
      </div>
      <button onclick="logout()" class="border border-red-500/50 text-red-500 px-4 py-2 rounded uppercase tracking-widest text-xs hover:bg-red-500/10 transition-colors">Logout</button>
    </div>

    <div class="grid md:grid-cols-4 gap-6 mb-10">
      <div class="card p-6 rounded shadow-lg border-l-2 border-purple-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Total Users</div>
        <div class="text-3xl gold font-mono">${totalUsers}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-yellow-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Total Waste</div>
        <div class="text-3xl gold font-mono">${totalWaste}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-green-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Verified Waste</div>
        <div class="text-3xl gold font-mono">${verifiedWaste}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-blue-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Food Ledgers</div>
        <div class="text-3xl gold font-mono">${db.foodTickets.length}</div>
      </div>
      <div class="card p-6 rounded shadow-lg border-l-2 border-purple-500">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Reserve Ratio</div>
        <div class="text-2xl gold font-mono">${reserveRatio}% <span class="text-xs text-gray-400 block">${status}</span></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">Worker Activity</h4><canvas id="workerActivityChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">Garden Adoption</h4><canvas id="gardenChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">CO2 Growth</h4><canvas id="co2Chart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800"><h4 class="text-xs gold uppercase text-center mb-2">NGO Fulfillment</h4><canvas id="ngoChart"></canvas></div>
      <div class="card p-4 rounded shadow-lg border border-gray-800 lg:col-span-2"><h4 class="text-xs gold uppercase text-center mb-2">Reserve Health Gauge</h4><canvas id="reserveGauge"></canvas></div>
    </div>

    <!-- Approvals -->
    <div class="card p-6 rounded shadow-lg border border-gray-800 max-w-3xl">
      <h3 class="gold mb-4 uppercase font-bold tracking-widest border-b border-gray-800 pb-2">Pending Withdrawals</h3>
      <div class="space-y-3">
        ${pendingWithdrawals.length === 0
          ? "<p class='text-gray-500 text-sm italic'>No pending withdrawals.</p>"
          : pendingWithdrawals.map(w => `
            <div class="bg-gray-900 border border-gray-700 p-4 rounded flex justify-between items-center text-sm font-mono">
              <div>
                  <div class="text-yellow-500">Request ID: ${w.id}</div>
                  <div class="text-gray-400">Node ID: ${w.userId} | Amt: ${w.amount} ZC</div>
              </div>
              <button onclick="approveWithdrawal(${w.id})" class="gold-btn px-4 py-2 rounded text-xs uppercase shadow">Approve</button>
            </div>
          `).join("")
        }
      </div>
    </div>
  </div>
  `;

      renderCharts(db, totalDistributed);
    }

    function approveWithdrawal(id) {
      try {
        const db = getDB();
        const withdrawal = db.withdrawals.find(w => w.id === id);
        if (!withdrawal || withdrawal.status !== "pending") { showToast("Already processed."); return; }

        withdrawal.status = "approved";
        db.reserve -= withdrawal.amount;
        saveDB(db);

        showToast("Withdrawal approved.");
        renderAdmin();
      } catch (e) {
        console.error("Approve Withdrawal Error:", e);
      }
    }

    /* =========================
       DEMO DATA GENERATOR
    ========================= */

    function seedDemoData() {

      const db = getDB();

      if (db.wasteSubmissions.length > 0) return;

      for (let i = 0; i < 20; i++) {

        db.wasteSubmissions.push({
          id: Date.now() + i,
          userId: 3,
          lat: 20.5937 + Math.random() * 0.01,
          lng: 78.9629 + Math.random() * 0.01,
          status: i < 15 ? "verified" : "pending"
        });

      }

      for (let i = 0; i < 5; i++) {

        db.gardens.push({
          id: Date.now() + 100 + i,
          userId: 2,
          plants: 10 + i,
          trees: 1
        });

      }

      for (let i = 0; i < 3; i++) {

        db.foodTickets.push({
          id: Date.now() + 200 + i,
          ngoId: 4,
          item: "Rice",
          requiredQty: 100,
          remainingQty: 30,
          status: "open",
          contributors: []
        });

      }

      db.withdrawals.push({
        id: Date.now() + 500,
        userId: 2,
        amount: 200,
        status: "pending"
      });

      saveDB(db);

    }

    /* =========================
       ANALYTICS ENGINE
    ========================= */

    function computeAnalytics() {

      const db = getDB();

      const verified = db.wasteSubmissions.filter(s => s.status === "verified").length;

      const workers = db.users.filter(u => u.role === "worker").length;

      const gardens = db.gardens.length;

      const co2 = verified * 0.5;

      const ngoRequested = db.foodTickets.reduce((a, b) => a + b.requiredQty, 0);

      const ngoFulfilled = db.foodTickets.reduce((a, b) => a + (b.requiredQty - b.remainingQty), 0);

      const distributed = db.users.reduce((a, b) => a + (b.wallet || 0), 0);

      const reserveRatio = (db.reserve / (db.reserve + distributed)) * 100;

      return {

        workers,
        verified,
        gardens,
        co2,
        ngoRequested,
        ngoFulfilled,
        reserveRatio

      };

    }

    /* =========================
       CHART RENDERER
    ========================= */

    function renderAdminCharts() {
      if (window.workerActivityChart) window.workerActivityChart.destroy();
      if (window.gardenChart) window.gardenChart.destroy();
      if (window.co2Chart) window.co2Chart.destroy();
      if (window.ngoChart) window.ngoChart.destroy();
      if (window.reserveGauge) window.reserveGauge.destroy();

      const data = computeAnalytics();

      Chart.defaults.color = "#aaa";

      /* Worker Activity */

      window.workerActivityChart = new Chart(
        document.getElementById("workerActivityChart"),
        {
          type: "bar",
          data: {
            labels: ["Workers", "Verified"],
            datasets: [{
              data: [data.workers, data.verified],
              backgroundColor: ["#888", "#D4AF37"]
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* Garden Adoption */

      window.gardenChart = new Chart(
        document.getElementById("gardenChart"),
        {
          type: "line",
          data: {
            labels: ["Stage1", "Stage2", "Stage3"],
            datasets: [{
              data: [data.gardens / 3, data.gardens / 2, data.gardens],
              borderColor: "#00ff9c",
              tension: 0.4
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* CO2 */

      window.co2Chart = new Chart(
        document.getElementById("co2Chart"),
        {
          type: "bar",
          data: {
            labels: ["CO2 Saved"],
            datasets: [{
              data: [data.co2],
              backgroundColor: "#00e5ff"
            }]
          },
          options: { plugins: { legend: { display: false } } }
        }
      );

      /* NGO */

      window.ngoChart = new Chart(
        document.getElementById("ngoChart"),
        {
          type: "doughnut",
          data: {
            labels: ["Fulfilled", "Remaining"],
            datasets: [{
              data: [
                data.ngoFulfilled,
                data.ngoRequested - data.ngoFulfilled
              ],
              backgroundColor: ["#4caf50", "#444"]
            }]
          }
        }
      );

      /* Reserve Health */

      window.reserveGauge = new Chart(
        document.getElementById("reserveGauge"),
        {
          type: "doughnut",
          data: {
            labels: ["Reserve", "Distributed"],
            datasets: [{
              data: [
                data.reserveRatio,
                100 - data.reserveRatio
              ],
              backgroundColor: ["#D4AF37", "#222"]
            }]
          }
        }
      );

    }

    /* =========================
       AUTO INITIALIZE
    ========================= */

    function initAdminAnalytics() {

      seedDemoData();

      setTimeout(() => {
        renderAdminCharts();
      }, 300);

    }

    /* =========================
       ANIMATIONS
    ========================= */
    const waveCanvas = document.getElementById("waveCanvas");
    const wctx = waveCanvas.getContext("2d");
    function resizeCanvas() {
      waveCanvas.width = window.innerWidth;
      waveCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let waveOffset = 0;
    let waveReq;
    function animateWave() {
      if (!wctx) return;
      wctx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      wctx.beginPath();
      wctx.moveTo(0, waveCanvas.height / 2);
      for (let x = 0; x < waveCanvas.width; x++) {
        const y = waveCanvas.height / 2 + Math.sin((x + waveOffset) * 0.01) * 20;
        wctx.lineTo(x, y);
      }
      wctx.strokeStyle = "rgba(212,175,55,0.08)";
      wctx.lineWidth = 2;
      wctx.stroke();

      waveOffset += 1;
      waveReq = requestAnimationFrame(animateWave);
    }
    if (waveReq) cancelAnimationFrame(waveReq);
    animateWave();

    const particleCanvas = document.getElementById("particleCanvas");
    const pctx = particleCanvas ? particleCanvas.getContext("2d") : null;
    if (particleCanvas) {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }

    let particles = [];
    if (particleCanvas) {
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * particleCanvas.width,
          y: Math.random() * particleCanvas.height,
          r: Math.random() * 2,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }

    let particleReq;
    function animateParticles() {
      if (!pctx) return;
      pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      pctx.fillStyle = "rgba(212,175,55,0.4)";
      particles.forEach(p => {
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fill();
        p.y -= p.speed;
        if (p.y < 0) {
          p.y = particleCanvas.height;
        }
      });
      particleReq = requestAnimationFrame(animateParticles);
    }
    if (particleReq) cancelAnimationFrame(particleReq);
    animateParticles();

    /* =========================
       SAFE APP START
    ========================= */

    function startApp() {

      const db = getDB();

      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }

    }

    startApp();
  </script>
