<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Gold X™</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Leaflet OS Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --gold: #D4AF37;
      --gold-hover: #b8860b;
    }

    body {
      background-color: var(--bg);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .card {
      background-color: var(--card);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.1);
    }

    .gold-text {
      color: var(--gold);
    }

    .gold-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-hover));
      color: #000;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .gold-btn:hover {
      opacity: 0.9;
    }

    .gold-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: #444;
      color: #888;
      background-image: none;
    }

    .outline-btn {
      border: 1px solid var(--gold);
      color: var(--gold);
      background: transparent;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
      font-size: 0.875rem;
      width: 100%;
      cursor: pointer;
    }

    .outline-btn:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    .outline-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #444;
      color: #888;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--gold);
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-glow {
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold);
    }

    .leaflet-container {
      z-index: 1;
      background: #111;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #1a1a1a;
      color: white;
      border: 1px solid var(--gold);
    }

    .hero-bg {
      background: linear-gradient(to bottom, #0f0f0f 0%, #1a1a1a 100%);
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    /* ==============================================
       DATABASE & STORAGE
       ============================================== */
    const DB_KEY = "zenith_gold_x_v2_db";
    const SESSION_KEY = "zenith_gold_x_v2_session";
    const TOTAL_RESERVE = 50000;

    function initDB() {
      if (!localStorage.getItem(DB_KEY)) {
        const initialDB = {
          users: [
            { email: "tansil@admin", password: "123", role: "admin", wallet: 0, co2: 0, wasteCount: 0, foodCount: 0, gardenCount: 0 },
            { email: "tansil@user", password: "123", role: "citizen", wallet: 0, co2: 0, wasteCount: 0, foodCount: 0, gardenCount: 0 },
            { email: "tansil@worker", password: "123", role: "worker", wallet: 0, co2: 0, wasteCount: 0, foodCount: 0, gardenCount: 0 },
            { email: "tansil@ngo", password: "123", role: "ngo", wallet: 0, co2: 0, wasteCount: 0, foodCount: 0, gardenCount: 0 }
          ],
          wasteSubmissions: [],
          foodDonations: [],
          gardenUpdates: [],
          withdrawals: []
        };
        localStorage.setItem(DB_KEY, JSON.stringify(initialDB));
      }
    }

    function getDB() { return JSON.parse(localStorage.getItem(DB_KEY) || "{}"); }
    function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
    function getSession() { const s = localStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; }
    function setSession(user) { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    /* ==============================================
       GEOLOCATION UTILS
       ============================================== */
    function captureLocation(callback, errorCallback) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            callback({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              timestamp: Date.now()
            });
          },
          err => {
            alert("Geolocation is required. Please allow access.");
            if (errorCallback) errorCallback();
          },
          { enableHighAccuracy: true } // Request high accuracy for better precision
        );
      } else {
        alert("Geolocation is not supported by this browser.");
        if (errorCallback) errorCallback();
      }
    }

    /* ==============================================
       CAMERA UTILS
       ============================================== */
    function handleImageCapture(event, previewId, stateObj, key, btnId) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        stateObj[key] = e.target.result;
        const img = document.getElementById(previewId);
        img.src = e.target.result;
        img.classList.remove('hidden');

        // Keep the placeholder hidden, and mark camera handled
        const placeholder = img.parentElement.querySelector('.cam-placeholder');
        if (placeholder) placeholder.classList.add('hidden');

        const btn = document.getElementById(btnId);
        if (btn) btn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    /* ==============================================
       GLOBAL CHARTS & MAPS
       ============================================== */
    let charts = {};
    function destroyChart(id) {
      if (charts[id]) {
        charts[id].destroy();
        delete charts[id];
      }
    }

    /* ==============================================
       APP ROUTER & STATE
       ============================================== */
    const appEl = document.getElementById('app');

    function render() {
      initDB();
      const session = getSession();

      if (!session) {
        renderLanding();
      } else {
        const db = getDB();
        const freshUser = db.users.find(u => u.email === session.email);
        if (!freshUser) { clearSession(); renderLanding(); return; }
        setSession(freshUser); // Update local cache

        appEl.className = "min-h-screen bg-[#0f0f0f]";
        appEl.innerHTML = `
                    <div class="w-full max-w-7xl mx-auto px-4 py-8 fade-in">
                        <header class="flex flex-col md:flex-row justify-between md:items-center mb-10 border-b border-[#333] pb-6">
                            <div class="mb-4 md:mb-0 flex items-center gap-4">
                                <img src="logo.png" alt="Logo" class="w-12 h-12 rounded-full border border-[var(--gold)] object-cover bg-black" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'48\\' height=\\'48\\'><rect width=\\'48\\' height=\\'48\\' fill=\\'black\\'/><circle cx=\\'24\\' cy=\\'24\\' r=\\'12\\' fill=\\'%23D4AF37\\' opacity=\\'0.5\\'/></svg>'">
                                <div>
                                    <h1 class="text-3xl font-bold header-glow gold-text tracking-wider uppercase mb-1">Zenith Gold X™</h1>
                                    <p class="text-gray-400 text-sm uppercase tracking-widest">${freshUser.role} Dashboard</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-right hidden sm:block">
                                    <div class="text-xs uppercase text-gray-500 mb-1">Identity</div>
                                    <div class="text-sm font-bold text-white">${freshUser.email}</div>
                                </div>
                                <button onclick="handleLogout()" class="outline-btn w-auto text-sm py-2">Sign Out</button>
                            </div>
                        </header>
                        <main id="main-content"></main>
                    </div>
                `;

        const mainContent = document.getElementById('main-content');
        if (freshUser.role === 'admin') renderAdmin(mainContent, db);
        else if (freshUser.role === 'citizen') renderCitizen(mainContent, db, freshUser);
        else if (freshUser.role === 'worker') renderWorker(mainContent, db, freshUser);
        else if (freshUser.role === 'ngo') renderNGO(mainContent, db, freshUser);
      }
    }

    /* ==============================================
       LANDING & LOGIN (Fixed 4 Accounts)
       ============================================== */
    function renderLanding() {
      appEl.className = "min-h-screen hero-bg flex flex-col items-center justify-center p-4 relative overflow-hidden";
      appEl.innerHTML = `
                <!-- Background ambient glow -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-[800px] bg-[var(--gold)] opacity-[0.03] blur-[120px] rounded-full pointer-events-none"></div>

                <div class="z-10 text-center max-w-3xl fade-in w-full">
                    <!-- Logo centered above title -->
                    <img src="logo.png" alt="Zenith Gold X" class="w-24 h-24 mx-auto mb-6 rounded-xl border border-[var(--gold)] shadow-[0_0_30px_rgba(212,175,55,0.2)] object-cover bg-black" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'96\\' height=\\'96\\'><rect width=\\'96\\' height=\\'96\\' fill=\\'black\\'/><circle cx=\\'48\\' cy=\\'48\\' r=\\'24\\' fill=\\'%23D4AF37\\' opacity=\\'0.5\\'/></svg>'">
                    
                    <h1 class="text-4xl md:text-6xl font-bold header-glow gold-text tracking-widest uppercase mb-4">Zenith Gold X™</h1>
                    <p class="text-lg md:text-xl text-gray-400 mb-10 tracking-wide font-light">The Global Civic-Tech Backbone.</p>
                    
                    <div id="auth-panel" class="card max-w-md mx-auto mb-16 hidden">
                        <h2 class="text-xl gold-text font-semibold mb-6 uppercase tracking-widest text-left border-b border-[#333] pb-2">Central Authorization</h2>
                        <div id="login-error" class="bg-red-900/20 text-red-500 border border-red-500/50 p-3 rounded text-sm mb-6 hidden text-left font-mono"></div>
                        <form id="login-form" class="text-left">
                            <label class="block text-xs uppercase text-gray-400 mb-2 tracking-wider">Identity Node</label>
                            <input type="email" id="email" placeholder="email@domain.com" required autocomplete="off" class="mb-5">
                            <label class="block text-xs uppercase text-gray-400 mb-2 tracking-wider">Passcode</label>
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="off" class="mb-6">
                            <button type="submit" class="gold-btn py-3 text-lg uppercase tracking-wider">Authorize Access</button>
                        </form>
                    </div>

                    <div id="landing-actions" class="flex flex-col sm:flex-row gap-4 justify-center mb-16">
                        <button onclick="document.getElementById('auth-panel').classList.remove('hidden'); document.getElementById('landing-actions').classList.add('hidden');" class="gold-btn md:w-auto px-12 py-4 text-lg uppercase tracking-wider">Sign In securely</button>
                    </div>

                    <!-- Feature Cards Setup Exactly like requested Premium UI -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left opacity-80 mt-12">
                        <div class="bg-[#111] border border-[#333] p-6 rounded-xl hover:border-[var(--gold)] transition-colors">
                            <div class="text-[var(--gold)] mb-3 text-2xl">⚡</div>
                            <h3 class="text-white font-bold mb-2 uppercase tracking-wide">AI Verified</h3>
                            <p class="text-gray-500 text-sm">Automated processing ensures complete systemic integrity algorithmically.</p>
                        </div>
                        <div class="bg-[#111] border border-[#333] p-6 rounded-xl hover:border-[var(--gold)] transition-colors">
                            <div class="text-[var(--gold)] mb-3 text-2xl">🛡️</div>
                            <h3 class="text-white font-bold mb-2 uppercase tracking-wide">Secure Rewards</h3>
                            <p class="text-gray-500 text-sm">Every civic action deposits directly into your distributed treasury.</p>
                        </div>
                        <div class="bg-[#111] border border-[#333] p-6 rounded-xl hover:border-[var(--gold)] transition-colors">
                            <div class="text-[var(--gold)] mb-3 text-2xl">🌱</div>
                            <h3 class="text-white font-bold mb-2 uppercase tracking-wide">Civic Growth</h3>
                            <p class="text-gray-500 text-sm">Engage in community sustainability protocols to elevate your standing.</p>
                        </div>
                    </div>
                </div>
            `;

      const form = document.getElementById('login-form');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value.trim();
          const pass = document.getElementById('password').value.trim();
          const errEl = document.getElementById('login-error');

          const db = getDB();
          const user = db.users.find(u => u.email === email && u.password === pass);

          if (user) {
            setSession(user);
            render();
          } else {
            errEl.textContent = "ERR: Credentials invalid or unauthorized.";
            errEl.classList.remove('hidden');
          }
        });
      }
    }

    function handleLogout() {
      clearSession();
      render();
    }

    // Shared function for leaderboards
    function getLeaderboardHTML(db, roleTitle, roleName) {
      if (!Array.isArray(db.users)) return '';
      const sorted = db.users.filter(u => u.role === roleName).sort((a, b) => b.wallet - a.wallet).slice(0, 5);
      return `
                <div class="mb-6">
                    <h3 class="text-sm uppercase tracking-widest text-[var(--gold)] mb-3 border-b border-[#333] pb-1">${roleTitle} Rank</h3>
                    <div class="space-y-2">
                        ${sorted.length === 0 ? '<p class="text-gray-600 italic text-sm">No data.</p>' : ''}
                        ${sorted.map((u, i) => `
                            <div class="flex justify-between items-center bg-[#111] p-2 px-3 rounded text-sm ${i === 0 ? 'border border-[var(--gold)] shadow-[0_0_10px_rgba(212,175,55,0.15)]' : 'border border-[#222]'}">
                                <span class="${i === 0 ? 'gold-text font-bold' : 'text-gray-300'}">${i === 0 ? '🥇' : `#${i + 1}`} ${u.email.split('@')[0]}</span>
                                <span class="font-mono text-gray-400">${u.wallet} ZC</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
    }

    /* ==============================================
       CITIZEN MODULE
       ============================================== */
    let stateCitizen = { wasteImg: null, foodImg: null, gardenImg: null };

    function renderCitizen(container, db, user) {
      container.innerHTML = `
                <!-- Stats Row -->
                <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                    <div class="card text-center flex flex-col justify-center lg:col-span-2">
                        <div class="text-xs text-gray-400 uppercase tracking-widest mb-1">Treasury Balance</div>
                        <div class="text-4xl md:text-5xl font-bold gold-text font-mono">${user.wallet} ZC</div>
                    </div>
                    <div class="bg-[#111] border border-[#222] rounded-xl p-4 text-center flex flex-col justify-center">
                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">CO₂ Offset</div>
                        <div class="text-2xl font-bold text-green-500">${user.co2.toFixed(1)}kg</div>
                    </div>
                    <div class="bg-[#111] border border-[#222] rounded-xl p-4 text-center flex flex-col justify-center">
                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Waste Captured</div>
                        <div class="text-2xl font-bold text-white">${user.wasteCount}</div>
                    </div>
                    <div class="bg-[#111] border border-[#222] rounded-xl p-4 text-center flex flex-col justify-center">
                        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Food Provided</div>
                        <div class="text-2xl font-bold text-white">${user.foodCount}</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <!-- Left Col: Actions -->
                    <div class="space-y-6 lg:col-span-2">
                        <!-- Waste Sub -->
                        <div class="card relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-1 h-full bg-[var(--gold)]"></div>
                            <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-[var(--gold)]">Civic Waste Upload</h2>
                            <p class="text-sm text-gray-400 mb-4 line-clamp-2">Provide geo-tagged photographic evidence of waste for worker routing and classification.</p>
                            
                            <input type="file" id="w-cam" accept="image/*" capture="environment" class="hidden" onchange="handleImageCapture(event, 'w-img', stateCitizen, 'wasteImg', 'w-btn')">
                            <div class="bg-black border border-[#333] rounded overflow-hidden h-40 mb-4 flex items-center justify-center cursor-pointer hover:border-[#666] transition-colors" onclick="document.getElementById('w-cam').click()">
                                <img id="w-img" class="w-full h-full object-cover hidden">
                                <div class="cam-placeholder flex flex-col items-center">
                                    <span class="text-3xl mb-2">📸</span>
                                    <span class="text-xs uppercase tracking-widest text-[var(--gold)]">Capture Required</span>
                                </div>
                            </div>
                            <button id="w-btn" disabled class="gold-btn uppercase tracking-widest relative overflow-hidden flex items-center justify-center gap-2" onclick="submitWasteFlow()">
                                Deploy Geo-Packet
                            </button>
                        </div>

                        <!-- Food Sub -->
                        <div class="card relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                            <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-[var(--gold)]">NGO Food Logistics</h2>
                            <p class="text-sm text-gray-400 mb-4 line-clamp-2">Contribute resources. Live photo and geolocation are strictly required to combat spoilage fraud.</p>
                            
                            <input type="file" id="f-cam" accept="image/*" capture="environment" class="hidden" onchange="handleImageCapture(event, 'f-img', stateCitizen, 'foodImg', 'f-btn')">
                            <div class="bg-black border border-[#333] rounded overflow-hidden h-40 mb-4 flex items-center justify-center cursor-pointer hover:border-[#666] transition-colors" onclick="document.getElementById('f-cam').click()">
                                <img id="f-img" class="w-full h-full object-cover hidden">
                                <div class="cam-placeholder flex flex-col items-center">
                                    <span class="text-3xl mb-2">📸</span>
                                    <span class="text-xs uppercase tracking-widest text-[#3b82f6]">Capture Required</span>
                                </div>
                            </div>
                            <button id="f-btn" disabled class="gold-btn !bg-gradient-to-br !from-blue-600 !to-blue-800 !text-white uppercase tracking-widest flex items-center justify-center gap-2" onclick="submitFoodFlow()">
                                Issue Donation Ledger
                            </button>
                        </div>

                    </div>

                    <!-- Right Col: Gardens & Leaderboard -->
                    <div class="space-y-6">
                        <!-- Terrace Garden -->
                        <div class="card relative overflow-hidden group">
                           <div class="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
                           <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-[var(--gold)]">Terrace Garden</h2>
                           <div class="flex justify-between items-center mb-4 border-b border-[#333] pb-4">
                               <span class="text-sm text-gray-300 uppercase tracking-widest">Growth Stages</span>
                               <span class="text-2xl font-bold ${user.gardenCount > 0 ? 'text-green-500' : 'text-gray-500'}">${user.gardenCount}</span>
                           </div>

                           <input type="file" id="g-cam" accept="image/*" capture="environment" class="hidden" onchange="handleImageCapture(event, 'g-img', stateCitizen, 'gardenImg', 'g-btn')">
                            <div class="bg-black border border-[#333] rounded overflow-hidden h-32 mb-4 flex items-center justify-center cursor-pointer hover:border-[#666] transition-colors" onclick="document.getElementById('g-cam').click()">
                                <img id="g-img" class="w-full h-full object-cover hidden">
                                <div class="cam-placeholder flex flex-col items-center">
                                    <span class="text-xl mb-1">📸</span>
                                    <span class="text-[10px] uppercase tracking-widest text-green-500">Capture Bio-Data</span>
                                </div>
                            </div>
                           <button id="g-btn" disabled onclick="submitGardenFlow()" class="outline-btn !border-green-500 !text-green-500 hover:!bg-green-900/20 text-xs w-full py-3 uppercase tracking-widest">Log Biometric Update</button>
                        </div>

                        <!-- Leaderboards -->
                        <div class="card p-5">
                            ${getLeaderboardHTML(db, "Citizen", "citizen")}
                            ${getLeaderboardHTML(db, "Worker", "worker")}
                        </div>
                    </div>
                </div>
            `;
    }

    function submitWasteFlow() {
      if (!stateCitizen.wasteImg) return;
      const btn = document.getElementById('w-btn');
      btn.innerHTML = `<span class="animate-pulse">Locking GEO...</span>`;
      btn.disabled = true;

      captureLocation((loc) => {
        const db = getDB();
        const session = getSession();
        db.wasteSubmissions.push({
          id: Date.now().toString(),
          image: stateCitizen.wasteImg,
          lat: loc.lat,
          lng: loc.lng,
          timestamp: loc.timestamp,
          status: "pending",
          weight: 0,
          userEmail: session.email,
          workerEmail: null
        });
        const user = db.users.find(u => u.email === session.email);
        user.wasteCount++;
        saveDB(db);
        stateCitizen.wasteImg = null;
        alert("Waste packet encrypted and logged to logistics network.");
        render();
      }, () => {
        btn.innerHTML = `Deploy Geo-Packet`;
        btn.disabled = false;
      });
    }

    function submitFoodFlow() {
      if (!stateCitizen.foodImg) return;
      const btn = document.getElementById('f-btn');
      btn.innerHTML = `<span class="animate-pulse">Locking...</span>`;
      btn.disabled = true;

      captureLocation((loc) => {
        const db = getDB();
        const session = getSession();
        db.foodDonations.push({
          id: Date.now().toString(),
          image: stateCitizen.foodImg,
          lat: loc.lat,
          lng: loc.lng,
          timestamp: loc.timestamp,
          status: "pending",
          userEmail: session.email,
          ngoEmail: null
        });
        const user = db.users.find(u => u.email === session.email);
        user.foodCount++;
        saveDB(db);
        stateCitizen.foodImg = null;
        alert("Donation ledger deployed. Awaiting NGO routing.");
        render();
      }, () => {
        btn.innerHTML = `Issue Donation Ledger`;
        btn.disabled = false;
      });
    }

    function submitGardenFlow() {
      if (!stateCitizen.gardenImg) return;
      const btn = document.getElementById('g-btn');
      btn.innerHTML = "Processing...";
      btn.disabled = true;

      const db = getDB();
      const session = getSession();
      db.gardenUpdates.push({
        id: Date.now().toString(),
        image: stateCitizen.gardenImg,
        userEmail: session.email,
        timestamp: Date.now()
      });

      const user = db.users.find(u => u.email === session.email);
      user.gardenCount++;

      // Artificial reward for garden updates based on old requirements logic (e.g. +5 coins per log)
      user.wallet += 5;
      user.co2 += 0.5;

      saveDB(db);
      stateCitizen.gardenImg = null;
      alert(`Bio-log accepted. +5 ZC awarded.`);
      render();
    }

    /* ==============================================
       WORKER MODULE
       ============================================== */
    let workerMaps = {}; // Keep track of rendered dynamic leaflet maps

    function renderWorker(container, db, user) {
      // Clean up old maps
      Object.values(workerMaps).forEach(m => m.remove());
      workerMaps = {};

      const pending = Array.isArray(db.wasteSubmissions) ? db.wasteSubmissions.filter(w => w.status === "pending") : [];

      container.innerHTML = `
                <div class="card mb-8">
                    <h2 class="text-2xl gold-text font-bold mb-2 uppercase tracking-widest text-center">Logistics Terminal</h2>
                    <div class="flex flex-col sm:flex-row justify-center items-center gap-6 mt-6">
                        <div class="text-center">
                            <div class="text-xs uppercase text-gray-500 mb-1">Contract Balance</div>
                            <div class="text-4xl font-mono text-white">${user.wallet} <span class="text-lg text-[var(--gold)]">ZC</span></div>
                        </div>
                    </div>
                </div>

                <div class="font-bold text-gray-400 uppercase tracking-widest border-b border-[#333] pb-2 mb-6 text-sm">Active Field Contracts (${pending.length})</div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="worker-contracts">
                    ${pending.length === 0 ? '<p class="text-gray-600 italic lg:col-span-2">No active logistics targets detected in region.</p>' : ''}
                    ${pending.map(w => `
                        <div class="bg-[#111] border border-[#222] rounded-xl overflow-hidden shadow-lg flex flex-col">
                            <!-- Image Header -->
                            <div class="h-48 relative border-b border-[#333]">
                                <img src="${w.image}" class="w-full h-full object-cover">
                                <div class="absolute top-2 left-2 bg-black/80 px-2 py-1 text-xs uppercase tracking-widest text-gray-300 rounded border border-[#333] backdrop-blur font-mono">
                                    ID: ${w.id.substring(w.id.length - 6)}
                                </div>
                            </div>

                            <!-- Map Section -->
                            <div class="h-32 w-full relative z-0" id="map-w-${w.id}"></div>

                            <!-- Controls -->
                            <div class="p-4 flex flex-col gap-4">
                                <div>
                                    <div class="text-xs text-gray-500 uppercase">Reporting Citizen</div>
                                    <div class="text-sm text-gray-300">${w.userEmail}</div>
                                </div>
                                
                                <div class="flex items-center gap-2">
                                    <input type="number" id="weight-${w.id}" placeholder="Est. Weight (kg)" class="!mb-0 !py-2 !text-sm flex-1 font-mono">
                                    <button onclick="verifyWasteTarget(${w.id}, '${w.userEmail}')" class="gold-btn !py-2 !w-auto uppercase tracking-wider text-sm whitespace-nowrap">Execute</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

      // Initialize maps for each contract after DOM paints
      setTimeout(() => {
        pending.forEach(w => {
          const el = document.getElementById(`map-w-${w.id}`);
          if (el) {
            const map = L.map(el, { zoomControl: false, attributionControl: false }).setView([w.lat, w.lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.marker([w.lat, w.lng], {
              icon: L.divIcon({ className: 'custom-icon', html: '<div class="w-3 h-3 rounded-full bg-[#D4AF37] border-2 border-[#111] shadow-[0_0_10px_#D4AF37]"></div>' })
            }).addTo(map);
            workerMaps[w.id] = map;
          }
        });
      }, 100);
    }

    function verifyWasteTarget(idStr, citizenEmail) {
      const weightInput = document.getElementById(`weight-${idStr}`);
      const weightVal = parseFloat(weightInput.value);
      if (isNaN(weightVal) || weightVal <= 0) return alert("Must enter a valid measured weight payload.");

      const db = getDB();
      const session = getSession();

      const waste = db.wasteSubmissions.find(w => w.id === idStr.toString());
      if (!waste || waste.status === "verified") return alert("Target already processed.");

      const citizen = db.users.find(u => u.email === citizenEmail);
      const worker = db.users.find(u => u.email === session.email);

      // Execute Business Logic
      waste.status = "verified";
      waste.weight = weightVal;
      waste.workerEmail = session.email;

      citizen.wallet += 10;
      citizen.co2 += (weightVal * 0.2); // Artificial co2 metric

      worker.wallet += 15;
      worker.co2 += (weightVal * 0.1);

      saveDB(db);
      alert("Contract Executed. Resources Distributed.");
      render();
    }

    /* ==============================================
       NGO MODULE
       ============================================== */
    function renderNGO(container, db, user) {
      const pending = Array.isArray(db.foodDonations) ? db.foodDonations.filter(f => f.status === "pending") : [];

      container.innerHTML = `
                <div class="card mb-8 flex flex-col items-center">
                    <h2 class="text-2xl text-blue-500 font-bold mb-2 uppercase tracking-widest text-center">Relief Director Node</h2>
                    <div class="text-center mt-4">
                        <div class="text-xs uppercase text-gray-500 mb-1">Network Deliveries Processed</div>
                        <div class="text-4xl font-mono text-white">${db.foodDonations.filter(f => f.status === 'delivered').length}</div>
                    </div>
                </div>

                <div class="font-bold text-gray-400 uppercase tracking-widest border-b border-[#333] pb-2 mb-6 text-sm">Inbound Supply Vectors (${pending.length})</div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${pending.length === 0 ? '<p class="text-gray-600 italic lg:col-span-3">No inbound civic supplies detected.</p>' : ''}
                    ${pending.map(f => `
                        <div class="bg-[#111] border border-[#222] rounded-xl overflow-hidden shadow-lg flex flex-col">
                            <div class="h-40 relative">
                                <img src="${f.image}" class="w-full h-full object-cover grayscale opacity-80 hover:grayscale-0 transition-all duration-300">
                                <div class="absolute top-2 left-2 flex gap-2">
                                    <span class="bg-blue-600/80 px-2 py-1 text-[10px] uppercase font-bold text-white rounded backdrop-blur">Supply</span>
                                </div>
                            </div>
                            <div class="p-4 flex-1 flex flex-col justify-between">
                                <div class="mb-4">
                                    <div class="text-xs text-gray-500 uppercase">Provider</div>
                                    <div class="text-sm font-bold text-gray-200">${f.userEmail}</div>
                                    <div class="text-xs text-gray-600 font-mono mt-1">Geo: [${f.lat.toFixed(4)}, ${f.lng.toFixed(4)}]</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="ngoAction(${f.id}, 'delivered', '${f.userEmail}')" class="outline-btn !border-green-500 !text-green-500 hover:!bg-green-900/20 text-xs py-2 uppercase font-bold flex-1">Accept</button>
                                    <button onclick="ngoAction(${f.id}, 'rejected', '${f.userEmail}')" class="outline-btn !border-red-500 !text-red-500 hover:!bg-red-900/20 text-xs py-2 uppercase font-bold flex-[0.5]">Reject</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
    }

    function ngoAction(idStr, newStatus, producerEmail) {
      const db = getDB();
      const session = getSession();

      const f = db.foodDonations.find(x => x.id === idStr.toString());
      if (!f || f.status !== "pending") return;

      f.status = newStatus;
      f.ngoEmail = session.email;

      if (newStatus === "delivered") {
        const citizen = db.users.find(u => u.email === producerEmail);
        if (citizen) citizen.wallet += 8; // Grant citizen coins for accepted supply
        saveDB(db);
        alert("Supply Chain Confirmed.");
      } else {
        saveDB(db);
        alert("Supply Chain Rejected.");
      }
      render();
    }

    /* ==============================================
       ADMIN MODULE (Calculated Live Data)
       ============================================== */
    function renderAdmin(container, db) {
      // Safe arrays
      const wAll = Array.isArray(db.wasteSubmissions) ? db.wasteSubmissions : [];
      const fAll = Array.isArray(db.foodDonations) ? db.foodDonations : [];
      const gAll = Array.isArray(db.gardenUpdates) ? db.gardenUpdates : [];
      const uAll = Array.isArray(db.users) ? db.users : [];

      // Computations
      let totCit = 0, totWor = 0, totNgo = 0, totDistZC = 0;
      uAll.forEach(u => {
        if (u.role === 'citizen') totCit++;
        if (u.role === 'worker') totWor++;
        if (u.role === 'ngo') totNgo++;
        if (u.role !== 'admin') totDistZC += (u.wallet || 0);
      });

      const totSub = wAll.length;
      const totVer = wAll.filter(w => w.status === 'verified').length;
      const totWgt = wAll.filter(w => w.status === 'verified').reduce((sum, w) => sum + (w.weight || 0), 0);
      const totFood = fAll.filter(f => f.status === 'delivered').length;
      const totGard = gAll.length;

      const resZc = TOTAL_RESERVE - totDistZC;
      const resRatio = ((resZc / TOTAL_RESERVE) * 100).toFixed(1);

      let rColor = "text-green-500 border-green-500/30 bg-green-900/10";
      if (resRatio < 40 && resRatio >= 20) rColor = "text-yellow-500 border-yellow-500/30 bg-yellow-900/10";
      if (resRatio < 20) rColor = "text-red-500 border-red-500/30 bg-red-900/10";

      container.innerHTML = `
                <!-- Core KPIS -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                     <div class="bg-[#111] p-4 rounded-xl border border-[#222]">
                        <div class="text-[10px] text-gray-500 tracking-widest uppercase mb-1">Treasury Outflow</div>
                        <div class="text-2xl font-bold font-mono gold-text">${totDistZC} <span class="text-sm">ZC</span></div>
                    </div>
                     <div class="bg-[#111] p-4 rounded-xl border border-[#222] ${resRatio < 50 ? rColor : ''}">
                        <div class="text-[10px] text-gray-500 tracking-widest uppercase mb-1">Reserve Status</div>
                        <div class="text-2xl font-bold font-mono text-white">${resZc} <span class="text-sm">ZC</span> (${resRatio}%)</div>
                    </div>
                     <div class="bg-[#111] p-4 rounded-xl border border-[#222]">
                        <div class="text-[10px] text-gray-500 tracking-widest uppercase mb-1">Target Cleared</div>
                        <div class="text-2xl font-bold font-mono text-white">${totWgt} <span class="text-sm">KG</span></div>
                    </div>
                     <div class="bg-[#111] p-4 rounded-xl border border-[#222]">
                        <div class="text-[10px] text-gray-500 tracking-widest uppercase mb-1">Nodes (C/W/N)</div>
                        <div class="text-xl font-bold font-mono text-gray-300 tracking-widest">${totCit}<span class="text-[#333]">|</span>${totWor}<span class="text-[#333]">|</span>${totNgo}</div>
                    </div>
                </div>

                <!-- Deep Analytics -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    
                    <div class="card lg:col-span-2 flex flex-col justify-between">
                        <div class="flex justify-between items-center mb-6 border-b border-[#333] pb-3">
                            <h2 class="text-sm gold-text font-bold uppercase tracking-widest">Macro Processing Volume</h2>
                            <div class="text-[10px] uppercase text-gray-500 tracking-wider">Live View</div>
                        </div>
                        <div class="w-full h-64 relative">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>

                    <div class="card flex flex-col justify-between">
                        <div class="flex justify-between items-center mb-6 border-b border-[#333] pb-3">
                            <h2 class="text-sm gold-text font-bold uppercase tracking-widest">Eco Integrity</h2>
                        </div>
                        <div class="w-full h-48 relative mb-4">
                            <canvas id="doughnutChart"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <div class="text-center bg-[#111] border border-[#222] rounded py-2">
                                <div class="text-[10px] uppercase text-gray-500">Processed</div>
                                <div class="text-lg font-bold text-white">${totVer}/${totSub}</div>
                            </div>
                            <div class="text-center bg-[#111] border border-[#222] rounded py-2">
                                <div class="text-[10px] uppercase text-gray-500">Food/Garden</div>
                                <div class="text-lg font-bold text-white">${totFood} / ${totGard}</div>
                            </div>
                        </div>
                    </div>

                </div>
            `;

      // Chart Render Logic (Destroy before re-render)
      setTimeout(() => {
        Chart.defaults.color = '#777';
        Chart.defaults.font.family = 'Inter';

        // Doughnut chart setup
        destroyChart('dc');
        const ctxDC = document.getElementById('doughnutChart');
        if (ctxDC) {
          charts['dc'] = new Chart(ctxDC, {
            type: 'doughnut',
            data: {
              labels: ['Reserve ZC', 'Circulating'],
              datasets: [{
                data: [resZc, totDistZC || 0.1], // Avoid 0 crash for visual
                backgroundColor: ['#1A1A1A', '#D4AF37'],
                borderColor: '#333',
                borderWidth: 1
              }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
          });
        }

        // Bar Chart setup (Mock timeline, mapping total submissions dynamically for visual impact, normally would reduce by date string)
        destroyChart('bc');
        const ctxBC = document.getElementById('barChart');
        if (ctxBC) {
          charts['bc'] = new Chart(ctxBC, {
            type: 'bar',
            data: {
              labels: ['Sys init', 'Prior', 'Current'],
              datasets: [
                { label: 'Total Waste Packets', data: [0, Math.floor(totSub / 2), totSub], backgroundColor: '#D4AF37', borderRadius: 4 },
                { label: 'Verified Blocks', data: [0, Math.floor(totVer / 2), totVer], backgroundColor: '#22C55E', borderRadius: 4 }
              ]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              scales: {
                y: { grid: { color: '#222' }, beginAtZero: true },
                x: { grid: { display: false } }
              },
              plugins: { legend: { position: 'top', labels: { boxWidth: 10, usePointStyle: true } } }
            }
          });
        }
      }, 100);
    }

    /* ==============================================
       START APPLICATION ON SCRIPT LOAD
       ============================================== */
    render();

  </script>
</body>

</html>
