<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Gold X</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: white;
      overflow-x: hidden;
    }

    #waveCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .card {
      background: rgba(18, 18, 18, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.25s ease;
    }

    .card:hover {
      border-color: rgba(212, 175, 55, 0.15);
      box-shadow: 0 0 28px rgba(212, 175, 55, 0.08), 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .gold {
      color: #D4AF37;
    }

    .gold-btn {
      background: linear-gradient(135deg, #FFDF73 0%, #D4AF37 50%, #B89222 100%);
      color: #0a0a0a;
      font-weight: 700;
      letter-spacing: 0.05em;
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 18px rgba(212, 175, 55, 0.3);
    }

    .gold-btn:hover {
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.65), 0 8px 24px rgba(0, 0, 0, 0.3);
      transform: translateY(-2px);
    }

    .gold-btn:active {
      transform: translateY(0);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(212, 175, 55, 0.35);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 175, 55, 0.7);
    }

    .hidden {
      display: none;
    }

    /* Stat metric card accent pulse */
    @keyframes accentPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .metric-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: accentPulse 2s ease-in-out infinite;
    }

    /* Login page glow input */
    .login-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: white;
      border-radius: 10px;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      border-color: rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Admin tab navigation */
    .admin-tab {
      padding: 10px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .admin-tab:hover {
      color: #aaa;
    }

    .admin-tab.active {
      color: #D4AF37;
      border-bottom-color: #D4AF37;
    }

    /* Alert glow pulse */
    @keyframes alertGlow {

      0%,
      100% {
        box-shadow: 0 0 12px rgba(234, 179, 8, 0.35);
      }

      50% {
        box-shadow: 0 0 26px rgba(234, 179, 8, 0.7);
      }
    }

    /* Live dot pulse */
    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.85);
      }
    }
  </style>
</head>

<body>
  <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <canvas id="waveCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>

  <!-- Persistent Logo -->
  <div class="fixed top-4 left-5 z-50 flex items-center gap-3">
    <img src="logo.png" alt="Zenith Gold X"
      class="w-11 h-11 rounded-xl object-cover shadow-[0_0_14px_rgba(212,175,55,0.5)]"
      onerror="this.style.display='none'" />
    <div>
      <div class="text-yellow-400 font-bold tracking-[0.18em] text-sm leading-none">ZENITH GOLD X</div>
      <div class="text-[9px] text-gray-600 tracking-widest font-mono mt-0.5">CIVIC PLATFORM</div>
    </div>
  </div>

  <div id="app" class="relative z-10 w-full min-h-screen"></div>

  <script>
    function showToast(msg) {
      const container = document.getElementById("toastContainer");
      if (!container) return;
      const el = document.createElement("div");
      el.className = "px-6 py-3 rounded shadow-2xl font-mono text-xs backdrop-blur-md bg-black/80 border border-yellow-500/50 text-yellow-400 transform transition-all duration-300 translate-x-20 opacity-0 pointer-events-auto shadow-[0_4px_20px_rgba(212,175,55,0.2)]";
      el.innerText = msg;
      container.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.remove("translate-x-20", "opacity-0");
      });
      setTimeout(() => {
        el.classList.add("translate-x-20", "opacity-0");
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    /* =========================
       ZGX MASTER DATABASE ENGINE
    ========================= */

    const DB_KEY = "ZGX_DB";

    /* Initialize Database */
    function initializeDB() {

      const db = {
        users: [
          { id: 1, email: "tansil@admin", password: "123", role: "admin", wallet: 0 },
          { id: 2, email: "tansil@user", password: "123", role: "citizen", wallet: 0, co2: 0, gardenStage: 0 },
          { id: 3, email: "tansil@worker", password: "123", role: "worker", wallet: 0, completed: 0 },
          { id: 4, email: "tansil@ngo", password: "123", role: "ngo", wallet: 0 }
        ],

        wasteSubmissions: [],
        foodTickets: [],
        withdrawals: [],
        gardens: [],
        sosAlerts: [],
        reserve: 50000
      };

      localStorage.setItem(DB_KEY, JSON.stringify(db));
      return db;
    }

    /* Load Database Safely */
    function getDB() {

      let raw = localStorage.getItem(DB_KEY);

      if (!raw) {
        return initializeDB();
      }

      try {

        const db = JSON.parse(raw);

        if (!db.users) db.users = [];
        if (!db.wasteSubmissions) db.wasteSubmissions = [];
        if (!db.foodTickets) db.foodTickets = [];
        if (!db.withdrawals) db.withdrawals = [];
        if (!db.gardens) db.gardens = [];
        if (!db.sosAlerts) db.sosAlerts = [];

        return db;

      } catch {

        return initializeDB();

      }
    }

    /* Save Database */
    function saveDB(db) {
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    /* =========================
       SESSION ENGINE
    ========================= */

    let currentUser = null;

    try {
      currentUser = JSON.parse(localStorage.getItem("ZGX_SESSION"));
    } catch {
      currentUser = null;
    }

    function setSession(user) {
      localStorage.setItem("ZGX_SESSION", JSON.stringify(user));
      currentUser = user;
    }

    function clearSession() {
      localStorage.removeItem("ZGX_SESSION");
      currentUser = null;
    }

    /* =========================
       HAVERSINE DISTANCE (meters)
    ========================= */
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    /* =========================
       BASIC ROUTER
    ========================= */
    function render() {
      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }
    }

    function renderLogin() {
      document.getElementById("app").innerHTML = `
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <!-- Logo block -->
      <div class="flex flex-col items-center mb-8">
        <img src="logo.png" alt="Zenith Gold X" class="w-20 h-20 rounded-2xl object-cover mb-4 shadow-[0_0_30px_rgba(212,175,55,0.4)]" onerror="this.style.display='none'" />
        <h1 class="text-2xl font-bold gold uppercase tracking-[0.2em]">Zenith Gold X</h1>
        <p class="text-[10px] text-gray-600 font-mono tracking-widest mt-1">CIVIC PLATFORM · SECURE LOGIN</p>
      </div>

      <!-- Card -->
      <div class="card p-8 rounded-2xl border border-white/5 shadow-2xl">
        <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Email</label>
        <input id="email" placeholder="e.g. tansil@user" class="login-input mb-5"/>

        <label class="block text-[10px] text-gray-500 uppercase tracking-widest mb-2">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="login-input mb-6"
          onkeydown="if(event.key==='Enter') login()"/>

        <button onclick="login()" class="gold-btn w-full py-3.5 rounded-xl uppercase tracking-widest text-sm">Sign In</button>

        <p id="loginError" class="text-red-400 text-center text-xs mt-4 hidden">Invalid credentials — please try again.</p>

        <div class="mt-6 pt-5 border-t border-white/5 text-center">
          <p class="text-[10px] text-gray-600 font-mono uppercase tracking-widest mb-2">Demo Access</p>
          <div class="grid grid-cols-2 gap-1.5 text-[10px] font-mono">
            <div class="bg-white/3 border border-white/5 rounded-lg px-3 py-2 text-gray-500 text-left">
              <span class="text-yellow-600">tansil@admin</span>
            </div>
            <div class="bg-white/3 border border-white/5 rounded-lg px-3 py-2 text-gray-500 text-left">
              <span class="text-blue-400">tansil@user</span>
            </div>
            <div class="bg-white/3 border border-white/5 rounded-lg px-3 py-2 text-gray-500 text-left">
              <span class="text-emerald-400">tansil@worker</span>
            </div>
            <div class="bg-white/3 border border-white/5 rounded-lg px-3 py-2 text-gray-500 text-left">
              <span class="text-purple-400">tansil@ngo</span>
            </div>
          </div>
          <p class="text-[9px] text-gray-700 font-mono mt-2">Password: 123</p>
        </div>
      </div>
    </div>
  </div>
  `;
    }

    /* =========================
       LOGIN SYSTEM
    ========================= */

    function login() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const db = getDB();

      const user = db.users.find(
        u => u.email === email && u.password === password
      );

      if (!user) {

        const error = document.getElementById("loginError");

        if (error) {
          error.classList.remove("hidden");
        }

        return;

      }


      if (!db.loginLogs) db.loginLogs = [];
      db.loginLogs.push({ email: user.email, role: user.role, time: Date.now() });
      saveDB(db);
      setSession(user);

      render();

    }

    /* =========================
       LOGOUT
    ========================= */

    function logout() {

      clearSession();

      render();

    }

    function updateBanner() {
      const db = getDB();
      const active = db.foodTickets.some(t => t.status === "open");
      let banner = document.getElementById("globalNgoBanner");

      let dbUpdated = false;
      const now = Date.now();
      db.foodTickets.forEach(t => {
        if (t.status === 'open' && t.expiry && now > t.expiry) {
          t.status = 'expired';
          dbUpdated = true;
        }
      });
      if (dbUpdated) saveDB(db);

      if (active && currentUser) {
        if (!banner) {
          banner = document.createElement("div");
          banner.id = "globalNgoBanner";
          banner.className = "w-full bg-blue-900/90 text-blue-200 text-xs text-center py-2 font-mono uppercase tracking-widest border-b border-blue-500/50 fixed top-0 z-40 shadow-[0_0_15px_rgba(59,130,246,0.5)]";
          banner.innerHTML = "Active NGO Asset Demands on Network! Support logistics to earn ZC.";
          document.body.appendChild(banner);
        }
      } else {
        if (banner) banner.remove();
      }
    }

    function checkSOSBanner() {
      const db = getDB();
      const activeSOS = db.sosAlerts.filter(s => s.status === "active");
      let banner = document.getElementById("globalSOSBanner");

      if (activeSOS.length > 0 && currentUser) {
        if (!banner) {
          banner = document.createElement("div");
          banner.id = "globalSOSBanner";
          banner.style.cssText = [
            "position:fixed","top:0","left:0","right:0","z-index:999",
            "display:flex","align-items:center","justify-content:space-between",
            "padding:10px 20px",
            "background:linear-gradient(90deg,rgba(127,29,29,0.97),rgba(185,28,28,0.97))",
            "border-bottom:1px solid rgba(239,68,68,0.6)",
            "box-shadow:0 0 20px rgba(239,68,68,0.45)",
            "font-family:'Inter',sans-serif",
            "animation:alertGlow 2s ease-in-out infinite"
          ].join(";");
          document.body.appendChild(banner);
        }
        banner.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:16px">🚨</span>
            <span style="font-size:11px;font-weight:700;letter-spacing:0.15em;color:#fecaca;text-transform:uppercase">
              ${activeSOS.length} Active SOS Emergency${activeSOS.length > 1 ? 'ies' : ''} — Respond Now
            </span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:10px;color:rgba(252,165,165,0.7);font-family:monospace">
              ${activeSOS.length} alert${activeSOS.length > 1 ? 's' : ''} active
            </span>
            <button onclick="dismissSOSBanner()"
              style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:6px;border:1px solid rgba(252,165,165,0.4);color:#fca5a5;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;">
              Dismiss
            </button>
          </div>`;
      } else {
        if (banner) banner.remove();
      }
    }

    function dismissSOSBanner() {
      const banner = document.getElementById("globalSOSBanner");
      if (banner) banner.remove();
    }

    function renderDashboard() {
      updateBanner();
      checkSOSBanner();

      if (!currentUser) {
        let banner = document.getElementById("globalNgoBanner");
        if (banner) banner.remove();
        let sosBanner = document.getElementById("globalSOSBanner");
        if (sosBanner) sosBanner.remove();
        renderLogin();
        return;
      }

      if (currentUser.role === "citizen") renderCitizen();
      if (currentUser.role === "worker") renderWorker();
      if (currentUser.role === "ngo") renderNGO();
      if (currentUser.role === "admin") renderAdmin();

      // Start voice safety listener for all roles that have commands configured
      startVoiceSafety();
    }

    /* =========================
       CITIZEN ENGINE
    ========================= */
    function switchCitizenTab(id) {
      ['tab-overview', 'tab-waste', 'tab-garden', 'tab-food', 'tab-safety'].forEach(t => {
        const el = document.getElementById(t);
        const btn = document.querySelector(`[data-tab="${t}"]`);
        if (el) el.classList.toggle('hidden', t !== id);
        if (btn) btn.classList.toggle('border-yellow-500', t === id);
        if (btn) btn.classList.toggle('text-yellow-400', t === id);
        if (btn) btn.classList.toggle('text-gray-500', t !== id);
        if (btn) btn.classList.toggle('border-transparent', t !== id);
      });
      if (id === 'tab-waste') setTimeout(() => { if (map) map.invalidateSize(); else initializeMap(); }, 150);
    }

      const db = getDB();
      const user = db.users.find(u => u.id === currentUser.id);
      const leaderboard = [...db.users].filter(u => u.role === "citizen").sort((a, b) => b.wallet - a.wallet);

      document.getElementById("app").innerHTML = `

        <button data-tab="tab-waste" onclick="switchCitizenTab('tab-waste')" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition-all">Upload Waste</button>

        <button data-tab="tab-safety" onclick="switchCitizenTab('tab-safety'); setTimeout(prefillVoiceInputs, 50);" class="px-5 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-gray-500 hover:text-red-400 transition-all">🛡 Safety</button>
      </div>

      <!-- TAB: Overview -->
      <div id="tab-overview">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="card p-6 rounded-xl border border-white/5 bg-black/30">
            <h3 class="gold mb-5 uppercase tracking-widest font-bold text-sm">Offer Exchange</h3>
            <div class="flex flex-col gap-3">
              <button onclick="redeemVoucher()" class="gold-btn px-4 py-3 rounded-lg text-sm uppercase tracking-widest">Redeem 200 ZC → Voucher</button>

            </div>

            <input type="number" id="withdrawAmount" placeholder="Minimum 100 ZC" class="mb-4 w-full p-3 bg-black/60 border border-gray-700/80 rounded-lg font-mono text-sm outline-none focus:border-yellow-500 transition-colors"/>
            <button onclick="requestWithdrawal()" class="gold-btn w-full px-6 py-3 rounded-lg uppercase text-sm font-bold">Request Withdrawal</button>

                <span class="flex items-center gap-3"><span class="text-[10px] ${i === 0 ? 'text-yellow-500' : 'text-gray-600'} w-5">#${i + 1}</span>${u.email.split('@')[0]}</span>

          </div>

      <div id="tab-waste" class="hidden">

    let map = null;
    let currentLat = null;
    let currentLng = null;

    function initializeMap() {
      try {
        const mapContainer = document.getElementById('map');
        if (!mapContainer) return;

        if (map) {
          map.remove();
          map = null;
        }
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);

        const geoOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(position => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;
          if (map) {
            map.setView([currentLat, currentLng], 15);
            L.marker([currentLat, currentLng]).addTo(map)
              .bindPopup("Your Location")
              .openPopup();
          }
        }, error => {
          console.error("Geolocation Error:", error);
          showToast("Location permission required to use map features.");
        }, geoOptions);
      } catch (e) {
        console.error("Map Initialization Error:", e);
      }
    }

    function submitWaste() {
      try {
        const photo = document.getElementById("wastePhoto").files[0];
        if (!photo) { showToast("Please upload waste photo."); return; }
        if (photo.size < 1024 * 10) { showToast("AI Confidence Low: File size < 10kb. Rejected."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        const db = getDB();
        const pendingCheck = db.wasteSubmissions.find(s => s.userId === currentUser.id && s.status === "pending");
        if (pendingCheck) { showToast("You already have a pending submission."); return; }

        const btn = document.getElementById("wasteSubmitBtn");
        if (btn) {
          btn.innerHTML = "Verifying... (AI 92%)";
          btn.disabled = true;
        }

        setTimeout(() => {
          try {
            const currentDb = getDB();
            currentDb.wasteSubmissions.push({
              id: Date.now(),
              userId: currentUser.id,
              lat: currentLat,
              lng: currentLng,
              status: "pending"
            });
            saveDB(currentDb);

            showToast("Waste submitted successfully. Waiting for worker verification.");
            renderCitizen();
          } catch (e) {
            console.error("Waste Submit Timeout Error:", e);
            if (btn) {
              btn.innerHTML = "Capture Location & Submit";
              btn.disabled = false;
            }
          }
        }, 1500);
      } catch (e) {
        console.error("Waste Submit Error:", e);
      }
    }

    function updateGarden() {
      try {
        const db = getDB();
        const user = db.users.find(u => u.id === currentUser.id);

        if (user.gardenStage >= 3) { showToast("Garden reward already completed."); return; }

        const plants = parseInt(document.getElementById("plantCount")?.value) || 0;
        const trees = parseInt(document.getElementById("treeCount")?.value) || 0;

        const photo = document.getElementById("gardenPhoto").files[0];
        if (!photo) { showToast("Upload garden photo."); return; }
        if (currentLat === null || currentLng === null) { showToast("Location not captured yet. Please allow permissions."); return; }

        if (user.gardenLat && user.gardenLng) {
          if (getDistance(currentLat, currentLng, user.gardenLat, user.gardenLng) > 500) {
            showToast("Location mismatch! You must upload from your registered garden location within 500m.");
            return;
          }
        } else {
          user.gardenLat = currentLat;
          user.gardenLng = currentLng;
        }

        const now = new Date().getTime();
        if (user.lastGardenUpdate) {
          const diff = now - user.lastGardenUpdate;
          const days = diff / (1000 * 60 * 60 * 24);
          if (days < 20) { showToast("You must wait 20 days between garden updates."); return; }
        }

        user.gardenStage = (user.gardenStage || 0) + 1;
        user.lastGardenUpdate = now;

        const reward = (plants * 1) + (trees * 5);
        const co2Gain = (plants * 0.5) + (trees * 5);

        user.wallet += reward;
        user.co2 = (user.co2 || 0) + co2Gain;
        db.reserve -= reward;

        if (user.gardenStage === 3) {
          user.wallet += 50;
          db.reserve -= 50;
          showToast(`Garden milestone completed! 50 ZC credited + ${reward} ZC based on plants/trees.`);
        } else {
          showToast(`Garden update recorded. Stage ${user.gardenStage}/3. Earned ${reward} Z Coins.`);
        }

        saveDB(db);
        renderCitizen();
      } catch (e) {
        console.error("Update Garden Error:", e);
      }
    }

    function submitFood() {

      const db = getDB();

      const ledgerId = document.getElementById("foodLedger").value;
      const qty = parseInt(document.getElementById("foodQty").value);

      const ticket = db.foodTickets.find(
        t => t.id.toString() === ledgerId.toString()
      );

      if (!ticket) return;

      ticket.remainingQty -= qty;

      ticket.contributors.push({
        user: currentUser.email,
        qty: qty,
        time: Date.now()
      });

      if (ticket.remainingQty <= 0) {
        ticket.status = "closed";
      }

      const user = db.users.find(u => u.id === currentUser.id);

      user.wallet += qty * 2;

      saveDB(db);

      showToast("Food donated");

      renderCitizen();
    }

        const user = db.users.find(u => u.id === currentUser.id);

        const citizen = db.users.find(u => u.id === submission.userId);

        if (citizen) citizen.wallet += 10;
        if (worker) {
          worker.wallet += 15;

          const today = new Date().toISOString().split('T')[0];

        showToast("Verification successful. Rewards distributed.");

      } catch (e) {
        console.error("Verify Waste Error:", e);
      }
    }

      Chart.defaults.font.family = "'Inter', sans-serif";

      // Doughnut — fulfilled vs remaining
      const donutEl = document.getElementById('ngoDonut');
      if (donutEl) {
        window.ngoDonutInst = new Chart(donutEl, {
          type: 'doughnut',
          data: {
            labels: ['Fulfilled', 'Remaining'],
            datasets: [{
              data: [totalFulfilled || 0, totalRemaining || (totalFulfilled === 0 ? 1 : 0)],
              backgroundColor: ['#D4AF37', '#1c1c1c'],

              borderWidth: 1,
              hoverOffset: 8

        });

      if (barEl) {

    function raiseTicket() {

      const item = document.getElementById("ngoItem").value.trim();
      const qty = parseInt(document.getElementById("ngoQty").value);

      if (!item || !qty || qty <= 0) {
        showToast("Invalid input");
        return;
      }

      const db = getDB();

      const ticket = {
        id: Date.now(),
        ngoId: currentUser.id,
        item: item,
        requiredQty: qty,
        remainingQty: qty,
        status: "open",
        expiry: Date.now() + (24 * 60 * 60 * 1000),
        contributors: []
      };

      db.foodTickets.push(ticket);

      saveDB(db);

      showToast("Ticket created");

      renderNGO();
    }

    function approveWithdrawal(id) {
      try {
        const db = getDB();
        const withdrawal = db.withdrawals.find(w => w.id === id);
        if (!withdrawal || withdrawal.status !== "pending") { showToast("Already processed."); return; }

        withdrawal.status = "approved";
        db.reserve -= withdrawal.amount;
        saveDB(db);

        showToast("Withdrawal approved.");
        renderAdmin();
      } catch (e) {
        console.error("Approve Withdrawal Error:", e);
      }
    }

    /* =========================
       SOS SAFETY MODULE  (Security Level: HIGH)
       Fixes: duplicate-word, min-length, pre-populate,
              duplicate-SOS, GPS accuracy, rate-limit,
              voice auto-restart, live user re-read,
              path cap, self-join block, wrong-user close
    ========================= */

    /* ── Security constants ─────────────────────── */
    const SOS_MIN_WORD_LEN   = 3;    // minimum trigger word length
    const SOS_RATE_LIMIT_MS  = 10000;// 10 s between SOS triggers
    const SOS_GPS_ACCURACY_M = 50;   // reject GPS fixes > 50 m accuracy
    const SOS_PATH_MAX       = 200;  // rolling path buffer size
    const SOS_VOICE_MAX_RETRY= 5;    // max voice-engine restarts

    let _lastSOSTrigger = 0;         // timestamp of last SOS trigger
    let _voiceRetries   = 0;         // voice restart counter

    /* ── FIX #11: Pre-populate inputs + FIX #1 + #10: Validate ── */
    function saveVoiceCommands() {
      const sosInput  = document.getElementById("sosCmd");
      const safeInput = document.getElementById("safeCmd");
      if (!sosInput || !safeInput) { showToast("Open the Safety tab first."); return; }

      const sosWord  = sosInput.value.trim().toLowerCase();
      const safeWord = safeInput.value.trim().toLowerCase();

      // FIX #10: minimum length
      if (sosWord.length < SOS_MIN_WORD_LEN || safeWord.length < SOS_MIN_WORD_LEN) {
        showToast(`Words must be at least ${SOS_MIN_WORD_LEN} characters.`); return;
      }
      // FIX #1: cannot be identical
      if (sosWord === safeWord) {
        showToast("SOS and SAFE words must be different."); return;
      }

      const db   = getDB();
      const user = db.users.find(u => u.id === currentUser.id);
      if (!user) { showToast("Session error — please log in again."); return; }

      user.sosCommand  = sosWord;
      user.safeCommand = safeWord;
      saveDB(db);
      // Restart voice engine with new words
      _voiceRetries = 0;
      startVoiceSafety();
      showToast("✅ Voice commands saved & listener restarted.");
    }

    /* ── FIX #11: Pre-populate Safety tab inputs when tab opens ── */
    function prefillVoiceInputs() {
      const db   = getDB();
      const user = db.users.find(u => u.id === currentUser.id);
      if (!user) return;
      const sosEl  = document.getElementById("sosCmd");
      const safeEl = document.getElementById("safeCmd");
      if (sosEl  && user.sosCommand)  sosEl.value  = user.sosCommand;
      if (safeEl && user.safeCommand) safeEl.value = user.safeCommand;
    }

    /* ── FIX #2 + #4 + #3: triggerSOS with de-dup, rate-limit, GPS accuracy ── */
    function triggerSOS() {
      if (!currentUser) { showToast("Not logged in."); return; }

      // FIX #4: rate-limit
      const now = Date.now();
      if (now - _lastSOSTrigger < SOS_RATE_LIMIT_MS) {
        showToast("⏱ Rate limited — wait a few seconds before re-triggering."); return;
      }

      // FIX #2: reject duplicate active SOS
      const dbCheck = getDB();
      const existing = dbCheck.sosAlerts.find(
        s => s.userId === currentUser.id && s.status === "active"
      );
      if (existing) { showToast("🚨 SOS already active. Say your SAFE word to cancel."); return; }

      if (!navigator.geolocation) { showToast("Geolocation not supported."); return; }

      // FIX #3: high-accuracy GPS with accuracy threshold
      navigator.geolocation.getCurrentPosition(pos => {
        if (pos.coords.accuracy > SOS_GPS_ACCURACY_M) {
          showToast(`⚠ GPS accuracy ${Math.round(pos.coords.accuracy)} m > ${SOS_GPS_ACCURACY_M} m. Retrying…`);
          // Retry once after 2 s
          setTimeout(triggerSOS, 2000);
          return;
        }

        _lastSOSTrigger = Date.now();

        const db  = getDB();
        const sos = {
          id: Date.now(),
          userId: currentUser.id,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
          status: "active",
          createdAt: Date.now(),
          responders: [],
          path: []
        };
        db.sosAlerts.push(sos);
        saveDB(db);

        vibrateAlert();
        startLiveTracking(sos.id);
        showToast("🚨 SOS Activated — Silent Mode");

      }, err => {
        showToast("Location permission required for SOS.");
        console.warn("SOS GPS error:", err.message);
      }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
    }

    /* ── Stealth vibration pattern ─────────────────────────────── */
    function vibrateAlert() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    }

    /* ── FIX #7: Live GPS tracking with rolling path buffer ──────── */
    let _sosTrackingIds = {};
    function startLiveTracking(sosId) {
      if (_sosTrackingIds[sosId]) return;
      _sosTrackingIds[sosId] = setInterval(() => {
        navigator.geolocation.getCurrentPosition(pos => {
          const db  = getDB();
          const sos = db.sosAlerts.find(s => s.id === sosId);
          if (!sos || sos.status !== "active") {
            clearInterval(_sosTrackingIds[sosId]);
            delete _sosTrackingIds[sosId];
            return;
          }
          sos.lat = pos.coords.latitude;
          sos.lng = pos.coords.longitude;
          sos.path.push({ lat: sos.lat, lng: sos.lng, t: Date.now() });
          // FIX #7: cap path to last SOS_PATH_MAX points
          if (sos.path.length > SOS_PATH_MAX) {
            sos.path = sos.path.slice(-SOS_PATH_MAX);
          }
          saveDB(db);
        }, () => {}, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
      }, 3000);
    }

    /* ── FIX #5 + #6: Voice engine with auto-restart + live user re-read ── */
    let _voiceRec = null;
    function startVoiceSafety() {
      if (!currentUser) return;
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) return;
      if (_voiceRec) { try { _voiceRec.abort(); } catch(e){} _voiceRec = null; }

      // FIX #6: read user fresh from DB at start time (updated again in onresult)
      const db   = getDB();
      const user = db.users.find(u => u.id === currentUser.id);
      if (!user || !user.sosCommand || !user.safeCommand) return;

      const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
      _voiceRec = new SR();
      _voiceRec.continuous     = true;
      _voiceRec.interimResults = false;
      _voiceRec.lang           = 'en-US';

      _voiceRec.onresult = function(e) {
        const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
        // FIX #6: re-read commands from DB (picks up updates without restart)
        const liveDB   = getDB();
        const liveUser = liveDB.users.find(u => u.id === currentUser.id);
        if (!liveUser) return;
        if (liveUser.sosCommand  && text.includes(liveUser.sosCommand))  triggerSOS();
        if (liveUser.safeCommand && text.includes(liveUser.safeCommand)) closeSOS();
      };

      // FIX #5: graceful error — don't die permanently
      _voiceRec.onerror = function(e) {
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') return; // mic denied — don't retry
        console.warn("Voice recognition error:", e.error);
      };

      // FIX #5: auto-restart on end with retry cap
      _voiceRec.onend = function() {
        if (_voiceRetries < SOS_VOICE_MAX_RETRY && currentUser) {
          _voiceRetries++;
          setTimeout(() => {
            try { if (_voiceRec) _voiceRec.start(); }
            catch(e) { /* already started */ }
          }, 500);
        }
      };

      try { _voiceRec.start(); _voiceRetries = 0; }
      catch(e) { console.warn("Voice start error:", e); }
    }

    /* ── FIX #9: closeSOS — only the SOS owner can close ─────────── */
    function closeSOS() {
      if (!currentUser) return;
      const db  = getDB();
      // FIX #9: strict owner check
      const sos = db.sosAlerts.find(
        s => s.userId === currentUser.id && s.status === "active"
      );
      if (!sos) { showToast("No active SOS found for your account."); return; }
      sos.status   = "closed";
      sos.closedAt = Date.now();
      saveDB(db);
      showToast("✅ Marked Safe — SOS closed.");
    }

    /* ── Haversine filter: nearby active alerts 300 m – 2 km ──────── */
    function getNearbySOS(lat, lng) {
      const db = getDB();
      return db.sosAlerts.filter(s => {
        if (s.status !== "active") return false;
        const d = getDistance(lat, lng, s.lat, s.lng);
        return d > 300 && d <= 2000;
      });
    }

    /* ── FIX #8: joinRescue — block self-join ─────────────────────── */
    function joinRescue(sosId) {
      if (!currentUser) return;
      const db  = getDB();
      const sos = db.sosAlerts.find(s => s.id === sosId);
      if (!sos) return;
      // FIX #8: victim cannot join their own rescue
      if (sos.userId === currentUser.id) {
        showToast("You cannot join your own rescue."); return;
      }
      if (sos.responders.includes(currentUser.id)) {
        showToast("You are already a responder."); return;
      }
      sos.responders.push(currentUser.id);
      saveDB(db);
      showToast("🤝 You joined the rescue!");
      loadNearbySOS();
    }

    /* ── Render nearby SOS list into #sos-nearby-list ─────────────── */
    function loadNearbySOS() {
      const container = document.getElementById("sos-nearby-list");
      if (!container) return;
      if (!navigator.geolocation) {
        container.innerHTML = '<p class="text-xs text-gray-600 italic">Geolocation unavailable.</p>';
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const list = getNearbySOS(pos.coords.latitude, pos.coords.longitude);
        if (list.length === 0) {
          container.innerHTML = '<p class="text-xs text-gray-600 italic">No active emergencies nearby. Area clear ✓</p>';
          return;
        }
        container.innerHTML = list.map(s => {
          const isSelf = s.userId === currentUser.id;
          return `
          <div class="p-4 mb-3 rounded-xl border ${isSelf ? 'border-yellow-500/40 bg-yellow-500/5' : 'border-red-500/40 bg-red-500/5'} flex justify-between items-center">
            <div>
              <div class="text-xs font-bold ${isSelf ? 'text-yellow-400' : 'text-red-400'} mb-1">
                ${isSelf ? '⚠ Your Active SOS' : '🚨 Active Emergency'}
              </div>
              <div class="text-[10px] font-mono text-gray-500">Responders: ${s.responders.length}</div>
              ${s.accuracy ? `<div class="text-[9px] font-mono text-gray-700">GPS ±${s.accuracy}m</div>` : ''}
            </div>
            ${isSelf
              ? `<button onclick="closeSOS()" class="border border-emerald-500/50 text-emerald-400 hover:bg-emerald-500/10 px-4 py-2 rounded-lg text-xs uppercase tracking-widest font-bold transition-all">Mark Safe</button>`
              : `<button onclick="joinRescue(${s.id})" class="gold-btn px-4 py-2 rounded-lg text-xs uppercase tracking-widest font-bold">Join Rescue</button>`
            }
          </div>`;
        }).join('');
      }, () => {
        container.innerHTML = '<p class="text-xs text-gray-600 italic">Location required to see nearby alerts.</p>';
      }, { enableHighAccuracy: true, timeout: 6000, maximumAge: 5000 });
    }

    /* =========================
       ANIMATIONS
    ========================= */
    const waveCanvas = document.getElementById("waveCanvas");
    const wctx = waveCanvas.getContext("2d");
    function resizeCanvas() {
      waveCanvas.width = window.innerWidth;
      waveCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let waveOffset = 0;
    let waveReq;
    function animateWave() {
      if (!wctx) return;
      wctx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
      wctx.beginPath();
      wctx.moveTo(0, waveCanvas.height / 2);
      for (let x = 0; x < waveCanvas.width; x++) {
        const y = waveCanvas.height / 2 + Math.sin((x + waveOffset) * 0.01) * 20;
        wctx.lineTo(x, y);
      }
      wctx.strokeStyle = "rgba(212,175,55,0.08)";
      wctx.lineWidth = 2;
      wctx.stroke();

      waveOffset += 1;
      waveReq = requestAnimationFrame(animateWave);
    }
    if (waveReq) cancelAnimationFrame(waveReq);
    animateWave();

    const particleCanvas = document.getElementById("particleCanvas");
    const pctx = particleCanvas ? particleCanvas.getContext("2d") : null;
    if (particleCanvas) {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }

    let particles = [];
    if (particleCanvas) {
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * particleCanvas.width,
          y: Math.random() * particleCanvas.height,
          r: Math.random() * 2,
          speed: Math.random() * 0.5 + 0.2
        });
      }
    }

    let particleReq;
    function animateParticles() {
      if (!pctx) return;
      pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      pctx.fillStyle = "rgba(212,175,55,0.4)";
      particles.forEach(p => {
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fill();
        p.y -= p.speed;
        if (p.y < 0) {
          p.y = particleCanvas.height;
        }
      });
      particleReq = requestAnimationFrame(animateParticles);
    }
    if (particleReq) cancelAnimationFrame(particleReq);
    animateParticles();

    /* =========================
       SAFE APP START
    ========================= */

    function startApp() {

      const db = getDB();

      if (!currentUser) {
        renderLogin();
      } else {
        renderDashboard();
      }

    }

    startApp();
  </script>
